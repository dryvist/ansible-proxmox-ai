---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: 'roles/.*/templates/'
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-added-large-files

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [-c, .yamllint]

  - repo: local
    hooks:
      - id: ansible-lint
        name: ansible-lint
        language: system
        # Scoped to roles/: this repo is roles-only (no site.yml/load_tofu.yml
        # yet — see AGENTS.md "Deploy orchestration"). Several roles'
        # meta/main.yml depend on docker_engine, a shared bootstrap role that
        # intentionally lives in ansible-proxmox-apps, not here; linting the
        # whole repo would fail resolving that cross-repo dependency even
        # though the roles themselves are correct.
        entry: ansible-lint roles/
        files: \.(yaml|yml)$
        pass_filenames: false

  # markdownlint-cli2, not markdownlint-cli: the repo's canonical markdown
  # config is .markdownlint-cli2.yaml (auto-discovered; line_length 160 +
  # CHANGELOG.md in its `ignores`). The previous markdownlint-cli hook pointed
  # at a .markdownlint.json that does not exist, so it linted with built-in
  # defaults (line_length 80) and failed on files the canonical config passes.
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.23.0
    hooks:
      - id: markdownlint-cli2
