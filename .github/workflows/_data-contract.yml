---
# Repo-specific data-contract checks for ansible-proxmox-ai.
#
# ansible-lint is centralized in dryvist/.github/_ansible-ci.yml. The job here
# asserts THIS repo's data contract — playbook syntax. It is not generic
# ansible CI, so it stays local and is aggregated by the wrapper's
# "Merge Gate".
#
# Two jobs: playbook syntax, and an inventory-load check that runs
# inventory/load_tofu.yml against the committed sample fixture and asserts
# the tag -> group mapping. The inventory SCHEMA itself stays owned upstream
# by ansible-proxmox-apps; this repo is a read-only consumer and only tests
# its own mapping of that contract.

name: Data Contract

on:
  workflow_call:

permissions:
  contents: read

jobs:
  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14'

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install -r requirements.yml

      - name: Syntax check playbooks
        run: |
          for playbook in playbooks/**/*.{yml,yaml}; do
            if [ -f "$playbook" ]; then
              echo "Checking syntax: $playbook"
              ansible-playbook "$playbook" --syntax-check
            fi
          done
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'false'

      - name: Verify Hermes API key seed contract
        run: >-
          ansible-playbook tests/openbao_secrets/verify_hermes_api_key_seed.yml
          -i inventory/hosts.yml -c local

  verify-inventory-load:
    name: Verify Inventory Load
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14'

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install -r requirements.yml

      # load_tofu.yml (imported by verify_inventory.yml) include_role's the
      # shared inventory_resolve role, so it must be installed before the run.
      - name: Install Ansible roles
        run: |
          ansible-galaxy role install -r requirements.yml

      - name: Verify inventory loads and groups are assigned correctly
        run: >-
          ansible-playbook tests/inventory_load/verify_inventory.yml
          -i inventory/hosts.yml -c local
        env:
          # Pin the fixture explicitly (resolution priority 1) so the test is
          # hermetic even on a runner with ambient AWS creds — the S3 artifact
          # (priority 2) must never feed a test.
          TOFU_INVENTORY_PATH: ${{ github.workspace }}/tests/inventory_load/tofu_inventory.json
          PROXMOX_SSH_KEY_PATH: /dev/null
          ANSIBLE_HOST_KEY_CHECKING: 'false'
