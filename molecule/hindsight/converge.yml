---
# Molecule converge playbook
# Tests the hindsight_docker role against the test container. Hindsight is
# stateless except Postgres, so the scenario boots a pgvector container first
# (via the same docker_engine bootstrap the role depends on) and points the
# role at it through the Docker bridge gateway.

- name: Converge
  hosts: all
  become: true
  gather_facts: true

  vars:
    # Override storage driver for Docker-in-Docker (vfs required, not fuse-overlayfs)
    hindsight_docker_storage_driver: vfs
    # Values normally injected from tofu_data.constants / OpenBao
    hindsight_docker_api_port: 8888
    hindsight_docker_cp_port: 9999
    hindsight_docker_db_port: 5432
    hindsight_docker_db_password: molecule-test-password
    hindsight_docker_cp_access_key: molecule-test-cp-key
    hindsight_docker_llm_api_key: molecule-test-llm-key
    hindsight_docker_llm_base_url: "http://127.0.0.1:9/v1"  # never called during converge
    hindsight_docker_llm_model: ai-default
    hindsight_docker_worker_id: hindsight-test
    # The production cold-start ceiling (10 min) is sized for HuggingFace model
    # downloads + a real fabric-router LLM verify; the scenario has neither, so
    # keep the readiness gate short to fail fast on a genuinely broken converge.
    hindsight_docker_startup_timeout: 120
    hindsight_docker_health_retries: 18
    hindsight_docker_health_delay: 5

  tasks:
    - name: Bootstrap Docker (same role the hindsight_docker meta dependency uses)
      ansible.builtin.include_role:
        name: docker_engine
      vars:
        docker_engine_configure_daemon_json: true
        docker_engine_storage_driver: vfs

# docker CLI, not community.docker.docker_container: the repo's roles deploy
    # via the compose CLI and never install the Python docker SDK the module
    # needs (same reason the roles use docker_compose_v2).
    - name: Check whether the pgvector Postgres is already running
      ansible.builtin.command: docker ps -q --filter name=hindsight-postgres --filter status=running
      register: hindsight_molecule_pg_running
      changed_when: false

    - name: Start a pgvector Postgres for the API to persist into
      ansible.builtin.command: >-
        docker run -d --name hindsight-postgres --restart unless-stopped
        -p 5432:5432
        -e POSTGRES_USER=hindsight
        -e POSTGRES_PASSWORD=molecule-test-password
        -e POSTGRES_DB=hindsight
        pgvector/pgvector:pg17
      when: hindsight_molecule_pg_running.stdout == ''
      changed_when: true

    - name: Discover the Docker bridge gateway (compose -> host-published ports)
      ansible.builtin.command: >-
        docker network inspect bridge
        --format {% raw %}'{{ (index .IPAM.Config 0).Gateway }}'{% endraw %}
      register: hindsight_molecule_bridge_gw
      changed_when: false

    - name: Converge hindsight with container-log capture on failure
      block:
        - name: Include hindsight_docker role
          ansible.builtin.include_role:
            name: hindsight_docker
          vars:
            hindsight_docker_db_host: "{{ hindsight_molecule_bridge_gw.stdout | trim }}"
      rescue:
        - name: Dump hindsight container logs (diagnosis)
          ansible.builtin.command: docker logs --tail 80 hindsight
          register: hindsight_molecule_logs
          changed_when: false
          failed_when: false

        - name: Dump docker state (diagnosis)
          ansible.builtin.command: docker ps -a
          register: hindsight_molecule_ps
          changed_when: false
          failed_when: false

        - name: Fail with the captured diagnostics
          ansible.builtin.fail:
            msg: |
              hindsight converge failed.
              docker ps -a:
              {{ hindsight_molecule_ps.stdout | default('') }}
              container logs:
              {{ hindsight_molecule_logs.stdout | default('') }}
              {{ hindsight_molecule_logs.stderr | default('') }}
