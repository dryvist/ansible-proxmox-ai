---
# Reverses cluster-hermes-pause.yml — run at teardown (~05:45 EDT) ONLY AFTER the
# OptiQ brain is confirmed back up on the Studio day-proxy (else resumed jobs fire
# into a still-dead brain and fail-DM). The 05:45 teardown verifies day residents
# ready BEFORE this runs. Restarts the seeded cron fleet + the brain-watchdog timer.
- name: Load OpenTofu infrastructure inventory
  import_playbook: ../inventory/load_tofu.yml

- name: Resume Hermes seeded fleet + restart brain-watchdog after the cluster window
  hosts: hermes_agent_group
  become: true
  gather_facts: false
  vars_files:
    # Seeded list derived from role defaults, not hardcoded — see the note in
    # cluster-hermes-pause.yml. Post kanban migration (#83) these are the
    # script-only `<job>-enqueue` crons.
    - ../roles/hermes_agent/defaults/main.yml
  vars:
    hermes_bin: /usr/local/bin/hermes
    hermes_home: /var/lib/hermes/.hermes
    hermes_user: hermes
  tasks:
    # Restart BEFORE resuming crons, so the first resumed job talks to a gateway
    # that has re-read the upstream rather than one still holding stale state.
    #
    # The gateway caches upstream properties in-process. When the brain changes
    # underneath it — a cluster window, or a darwin-rebuild on the Studio that
    # bounces dev.vllm-mlx.server — those cached values survive the outage and
    # are not corrected by resuming crons or by the watchdog. The known case is
    # a context window adopted from a fallback backend and then applied to
    # full-size requests, which fails every completion until the service is
    # restarted. Pausing and resuming the fleet does not clear it; only a
    # restart of this unit does.
    - name: Restart the Hermes gateway so it re-reads the recovered upstream
      ansible.builtin.systemd:
        name: hermes-gateway
        state: restarted
        daemon_reload: true

    # The gateway is a Type=simple queue-driven dispatcher, not a listener, so
    # there is no port to wait on. Restart=always also means systemd reports it
    # active while it crash-loops, so confirm it is still up a moment later
    # rather than trusting the state immediately after the restart returns.
    - name: Give the gateway a moment to fail if it is going to
      ansible.builtin.pause:
        seconds: 10

    - name: Confirm the gateway is running and has not entered a restart loop
      ansible.builtin.systemd:
        name: hermes-gateway
      register: gw_state
      changed_when: false

    - name: Fail loudly if the gateway did not come back
      ansible.builtin.assert:
        that:
          - gw_state.status.ActiveState == 'active'
          - gw_state.status.NRestarts | int <= 1
        fail_msg: >-
          hermes-gateway is {{ gw_state.status.ActiveState }} with
          {{ gw_state.status.NRestarts }} restarts — resuming the cron fleet now
          would fire every seeded job into a dead gateway and DM the operator.
        success_msg: "hermes-gateway active, NRestarts={{ gw_state.status.NRestarts }}"

    - name: Resume each role-seeded cron job
      ansible.builtin.command: "{{ hermes_bin }} cron resume {{ item }}"
      environment:
        HERMES_HOME: "{{ hermes_home }}"
      become: true
      become_user: "{{ hermes_user }}"
      loop: "{{ hermes_agent_seeded_cron_names }}"
      changed_when: true
      failed_when: false

    - name: Restart + re-enable the brain-health watchdog timer
      ansible.builtin.systemd:
        name: hermes-brain-watchdog.timer
        state: started
        enabled: true
        daemon_reload: true

    - name: Verify watchdog timer active
      ansible.builtin.systemd:
        name: hermes-brain-watchdog.timer
      register: wd_state
      changed_when: false
      failed_when: false

    - name: Verify cron fleet resumed
      ansible.builtin.command: "{{ hermes_bin }} cron list --all"
      environment:
        HERMES_HOME: "{{ hermes_home }}"
      become: true
      become_user: "{{ hermes_user }}"
      register: cron_list
      changed_when: false

    - name: Report verification (grep this in the run output)
      ansible.builtin.debug:
        msg: >-
          CLUSTER_RESUME_VERIFY watchdog_is_active={{ wd_state.status.ActiveState | default('unknown', true) }}
          (want active) ---CRON_LIST--- {{ cron_list.stdout }}
