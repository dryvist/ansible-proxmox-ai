---
- name: Add the authoritative winner to the local-llm secret accumulator
  ansible.builtin.set_fact:
    openbao_secrets_by_domain: >-
      {{ hostvars['localhost'].openbao_secrets_by_domain
         | combine({'local-llm':
             hostvars['localhost'].openbao_secrets_by_domain
             .get('local-llm', {})
             | combine({openbao_secrets_hermes_api_key_field:
                        openbao_secrets_hermes_current.secret[
                          openbao_secrets_hermes_api_key_field]})}) }}
  delegate_facts: true
