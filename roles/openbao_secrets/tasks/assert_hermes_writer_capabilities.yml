---
- name: Require exact Hermes data and metadata capabilities
  ansible.builtin.assert:
    that:
      - >-
        (openbao_secrets_hermes_writer_capabilities.data.data
         .get(openbao_secrets_hermes_api_data_path, []) | sort)
        == ['create', 'read', 'update']
      - >-
        (openbao_secrets_hermes_writer_capabilities.data.data
         .get(openbao_secrets_hermes_api_metadata_path, []) | sort)
        == ['read']
    fail_msg: >-
      HERMES_WRITE_BAO_TOKEN must have exactly create/read/update on
      secret/data/ai/hermes and exactly read on secret/metadata/ai/hermes.
