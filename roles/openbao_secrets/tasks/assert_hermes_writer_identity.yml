---
- name: Require an exact short-lived nonrenewable writer identity
  ansible.builtin.assert:
    that:
      - >-
        (openbao_secrets_hermes_writer_identity.data.data.policies | sort)
        == ['default', 'hermes-write']
      - >-
        openbao_secrets_hermes_writer_identity.data.data
        .get('identity_policies', []) | length == 0
      - >-
        not (openbao_secrets_hermes_writer_identity.data.data.renewable | bool)
      - openbao_secrets_hermes_writer_identity.data.data.orphan | bool
      - openbao_secrets_hermes_writer_identity.data.data.ttl | int > 0
      - >-
        openbao_secrets_hermes_writer_identity.data.data.ttl | int
        <= openbao_secrets_hermes_writer_max_ttl_seconds | int
    fail_msg: >-
      HERMES_WRITE_BAO_TOKEN must carry exactly default + hermes-write, have no
      identity policies, be nonrenewable and orphaned, and have 1-600 seconds
      remaining TTL.
