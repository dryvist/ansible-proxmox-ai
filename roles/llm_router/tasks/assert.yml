---
# Layer 1 — render-time contract assertions for the LiteLLM router config.
#
# Guards the "compress-death trap": if the model a consumer requests (the Hermes
# brain, Open WebUI's default) is NOT a first-class large-tier entry carrying a
# non-null context_window, the request falls through to the "*" wildcard
# passthrough, LiteLLM resolves max_input_tokens to null, and every downstream
# caller compresses its context to death. This is the render-time half of the
# check; the hermes_agent Layer 2 gate proves it end-to-end against the live
# router.
#
# Imported at the top of tasks/main.yml so it inherits the `llm_router` tag and
# always runs with the role. Read-only; safe in check mode.

- name: Assert every brain model consumers request is a tuned router entry (not the wildcard)
  ansible.builtin.assert:
    quiet: true
    that:
      # The fabric default the agent/UI actually request must resolve to a
      # first-class entry with a non-null context_window.
      - _llm_router_required_safe_models | difference(_llm_router_safe_models) | length == 0
      - >-
        llm_router_model_group_aliases | dict2items | map(attribute='value')
        | difference(_llm_router_safe_models) | length == 0
    fail_msg: >-
      Compress-death trap (roles/llm_router/tasks/assert.yml): model(s)
      [{{ _llm_router_required_safe_models | difference(_llm_router_safe_models) | join(', ') }}]
      are requested as the fabric brain but are NOT first-class entries in
      llm_router_large_models with a non-null context_window. They would fall
      through to the "*" wildcard passthrough, LiteLLM would resolve
      max_input_tokens to null, and Hermes/Open WebUI would compress every request
      to death (outage 2026-07-08). Add each as an entry with an explicit
      context_window. Constraint: config.yaml.j2 model_info.max_input_tokens.
    success_msg: >-
      Router brain entries carry real context windows
      ({{ _llm_router_required_safe_models | join(', ') }}).
  vars:
    # Safe set = large-tier model ids with a non-null context_window.
    _llm_router_safe_models: >-
      {{ llm_router_large_models
         | selectattr('context_window', 'defined')
         | rejectattr('context_window', 'none')
         | map(attribute='backend') | list }}
    # The model ids consumers actually request as a brain: ai_default_model
    # (Open WebUI + fabric default) and hermes_brain_model (Hermes' own brain,
    # decoupled 2026-07-19). Both must be tuned entries with a real
    # context_window or their consumer compresses to death. De-duped so a
    # converge where they point at the same id doesn't double-list.
    _llm_router_required_safe_models: >-
      {{ [ai_default_model,
          llm_router_model_group_aliases.get(hermes_brain_model, hermes_brain_model),
          llm_router_model_group_aliases.get(hermes_goal_judge_model, hermes_goal_judge_model)]
         | unique }}
