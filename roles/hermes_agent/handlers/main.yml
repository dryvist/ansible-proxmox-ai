---
- name: Restart hermes-gateway
  ansible.builtin.systemd:
    name: hermes-gateway
    state: restarted
    daemon_reload: true

- name: Restart hermes-dashboard
  ansible.builtin.systemd:
    name: hermes-dashboard
    state: restarted
    daemon_reload: true

- name: Restart sshd
  ansible.builtin.systemd:
    name: ssh
    state: restarted

- name: Restart hermes-brain-watchdog timer
  ansible.builtin.systemd:
    name: hermes-brain-watchdog.timer
    state: restarted
    daemon_reload: true

- name: Restart hermes-brain-sync timer
  ansible.builtin.systemd:
    name: hermes-brain-sync.timer
    state: restarted
    daemon_reload: true

- name: Restart rsyslog
  ansible.builtin.systemd:
    name: rsyslog
    state: restarted
