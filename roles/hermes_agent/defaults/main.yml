# The daily chain-break safety net (#83): one extra `--no-agent --script` cron
# that runs the enqueuer in `all --backfill` mode — re-creates any missing
# current-slot card (idempotent) and unblocks any due-but-still-blocked card
# (the reviewer chain's self-heal). No LLM session, so nothing to poison.
hermes_agent_kanban_safety_net_cron_name: kanban-enqueue-safety-net
hermes_agent_kanban_safety_net_schedule: "33 4 * * *"
hermes_agent_kanban_safety_net_enabled: >-
  {{ hermes_agent_slack_bot_token | length > 0
     and hermes_agent_slack_app_token | length > 0 }}

# Every cron job this role seeds — now the script-only enqueuer fleet
# (`<job>-enqueue` per card) plus the daily safety net. The model-drift recovery
# task (tasks/main.yml) only ever removes jobs on this list, and the brain
# watchdog only pauses/resumes jobs on this list — user/agent jobs are never
# touched. Script (`--no-agent`) jobs carry no model snapshot, so the drift GC's
# `model_snapshot`-defined filter skips them naturally (no guard change needed).
hermes_agent_seeded_cron_names: >-
  {{ (hermes_agent_kanban_cards | map(attribute='job') | list
      | map('regex_replace', '$', '-enqueue') | list)
     + [hermes_agent_kanban_safety_net_cron_name] }}

# --- Context7 MCP client (current library/framework docs on demand) ---
# Registers Context7 so Hermes can pull up-to-date, version-specific docs
# mid-task. Bao-first, env fallback (see group_vars); the entry is omitted
# until the API key is set. Dialed through the shared agentgateway MCP plane
# (one governed front door per target; the gateway federates outbound HTTPS
# to Context7) — set the URL back to https://mcp.context7.com/mcp to bypass
# the gateway.
hermes_agent_context7_mcp_enabled: true
hermes_agent_context7_mcp_url: >-
  https://mcp.{{ lookup('env', 'PROXMOX_SUBDOMAIN')
  | mandatory('PROXMOX_SUBDOMAIN required (Doppler)') }}/context7
hermes_agent_context7_api_key: ""

# --- Qdrant MCP client (persistent vector memory) ---
# Registers the qdrant-store / qdrant-find memory tools, dialed through the
# shared agentgateway MCP plane. Keyless for the caller — the gateway's
# mcp-server-qdrant sidecar holds the Qdrant credential (agentgateway_docker
# role), same posture as the context7 route.
hermes_agent_qdrant_mcp_enabled: true
hermes_agent_qdrant_mcp_url: >-
  https://mcp.{{ lookup('env', 'PROXMOX_SUBDOMAIN')
  | mandatory('PROXMOX_SUBDOMAIN required (Doppler)') }}/memory

# --- Escalation (Codex via MCP) ---
# A deliberate, agent-invoked path for problems worth a stronger model or a
# stuck/looping session — NOT automatic on-error retry (that's
# fallback_providers, an upstream Hermes feature intentionally unused here).
# Registers `codex mcp-server` as an MCP tool; tool use is inherently a
# per-call, model-chosen decision, so the agent reaches for this only when it
# judges it worth it, same as any other tool.
#
# Codex runs under a SEPARATE, isolated OS user (codex_runner role,
# colocated on this host) — Hermes invokes it via a single-command sudo
# grant, never gaining filesystem access to that user's ChatGPT-OAuth
# credential. codex_runner_user/codex_runner_mcp_command come from that
# role's defaults (same host, same play — see playbooks/site.yml).
#
# Inert until a human completes the one-time Codex OAuth bootstrap
# (roles/codex_runner/README.md) — the MCP entry renders regardless, and
# simply errors on use until then; the daemon itself is unaffected.
#
# Named after the tool (matching the sibling hermes_agent_splunk_mcp_enabled /
# hermes_agent_context7_mcp_enabled flags above), not the broader "escalation"
# concept — OPENROUTER_API_KEY is already parked as a candidate SECOND
# escalation tool (see README), which will need its own independent flag when
# wired, not a shared one.
hermes_agent_codex_mcp_enabled: true

# --- Layer 2 post-converge verification gate (tasks/verify.yml) --------------
# After the gateway (re)starts, a real end-to-end probe proves the brain wiring
# actually works before the converge is called done — every 2026-07-08 breakage
# was a config mistake that a single tool-call probe (or a journal grep) would
# have surfaced immediately. Disable only where there is no live brain to reach
# (mirrors llamaindex_verify_router); default on for real converges.
hermes_agent_verify_enabled: true
# journalctl tail scanned for fatal config-rejection lines since the restart.
hermes_agent_verify_journal_lines: 200
# Fatal startup/config-rejection substrings Hermes emits when the brain wiring is
# wrong: the context floor rejection ("below the minimum 64,000 required") and an
# unknown/mis-aliased model ("Model <id> does not exist"). Match => gate fails.
hermes_agent_verify_fatal_log_patterns:
  - "below the minimum"
  - "does not exist"
# The live tool-call probe forces a tool call through the router at the resolved
# brain and asserts a structurally valid tool_call comes back (non-empty
# function.name — the exact "invalid tool call" shape of the outage). Generous
# per-attempt timeout: the swap-tier brain may be loading on first hit.
hermes_agent_verify_probe_timeout: 300
hermes_agent_verify_probe_retries: 3
hermes_agent_verify_probe_delay: 10

# --- Brain-health watchdog: stop cron-failure spam during brain outages -------
# The default brain (ai_default_model) is a single-deployment model (llm_router role) with no viable
# fallback, and upstream Hermes ALWAYS delivers a cron failure ("Failed jobs
# always deliver regardless of the [SILENT] marker"). So a brain outage makes the
# stateless seeded fleet fail-and-DM the operator twice an hour per job, while
# nothing pages that the brain is even down (service_deadman watches DNS/Traefik/
# HAProxy/OpenBao, not the LLM fabric). This watchdog closes both gaps: a systemd
# timer probes the brain end-to-end and, on a DEBOUNCED transition, pauses/resumes
# the seeded cron fleet and alerts EXACTLY ONCE per edge. See templates/ +
# tasks/main.yml and the README.
hermes_agent_brain_watchdog_enabled: true
hermes_agent_brain_watchdog_script_path: /usr/local/bin/hermes-brain-watchdog.sh
# Probe cadence (systemd OnUnitActiveSec). 60s matches service_deadman.
hermes_agent_brain_watchdog_interval: "60s"
# Per-probe curl deadline. Comfortably covers a warm 1-token completion; a hung or
# unreachable brain trips it and counts as one failure toward the debounce.
hermes_agent_brain_watchdog_probe_timeout: 15
# Hysteresis: consecutive failures before declaring DOWN (pause+alert), and
# consecutive successes before declaring UP (resume+alert). down_after=3 over the
# 60s cadence (~3 min) rides rotation-flip bounces and cold reloads so the
# watchdog never becomes a new source of spam; up_after=2 damps flapping.
# Both are role vars — tune per environment. TRADEOFF: for an INTERMITTENT
# serving-stack wedge (INC-17083: brain briefly recovers then re-freezes), a
# higher up_after (e.g. 4-6) keeps the fleet paused LONGER across brief-recovery
# windows so fewer crons fire at a re-wedging brain — at the cost of slower
# resume after a genuine recovery. Default stays 2 (fast recovery); raise it if
# a flapping-wedge class dominates.
hermes_agent_brain_watchdog_down_after: 3
hermes_agent_brain_watchdog_up_after: 2
# Flap coalescing (2026-07-18): down_after/up_after debounce brief bounces, but
# a genuinely UNSTABLE backend still produces one clean alert per edge — a
# confirmed 31h-unstable backend produced dozens of up/down DM pairs. Once a
# down/up cycle completes, further edges within this cooldown are coalesced
# (counted, cooldown extended) into one eventual summary instead of alerting
# individually. 3600s (60 min) is long enough to absorb a flapping episode
# without swallowing a second, genuinely independent outage hours later.
hermes_agent_brain_watchdog_flap_cooldown_seconds: 3600
# Sustained-flap escalation (INC-17083, 2026-07-19): the coalescer above only
# emits a summary once the brain STABILIZES (flap_summary_check). A wedge that
# flaps for hours without a clean recovery never stabilizes, so no summary ever
# fires and a multi-hour instability is SILENT to the operator — observed live
# as 15 flaps over ~2.5h with zero alert (every edge coalesced). Fix: while
# STILL flapping, fire ONE loud page once the episode crosses either threshold
# below, then re-arm with a long cooldown so a genuine long wedge pages at most
# hourly, not per-flap. Set threshold to 0 to disable.
hermes_agent_brain_watchdog_sustained_flap_threshold: 5       # coalesced flaps, or
hermes_agent_brain_watchdog_sustained_flap_seconds: 1800      # unstable this long (30m)
hermes_agent_brain_watchdog_sustained_flap_rearm_seconds: 3600  # re-page at most hourly
# Urgent page target. Same topic service_deadman pages on ("same feed as other
# homelab outages", operator decision) — the brain is now a keystone.
# FQDN-first: the Traefik-fronted ntfy service name; DHCP/DNS own the address.
hermes_agent_brain_watchdog_ntfy_topic: "keystone"
hermes_agent_brain_watchdog_ntfy_url: >-
  https://ntfy.{{ tofu_data.domain }}/{{ hermes_agent_brain_watchdog_ntfy_topic }}

# External deadman OK-ping (silent-Mac / LXC-down gap, INC-17114). The ntfy +
# Slack alerts above only fire when THIS watchdog DETECTS a brain outage — they
# run on this LXC, so a powered-off LXC, a masked timer, or a wedged systemd
# silences them with no page at all. So on every healthy probe the watchdog also
# pings an external healthchecks-style deadman; when that ping STOPS (this host
# gone, timer dead, or the brain unreachable — which includes a silent Mac
# serving host), the external service pages on its own. Injection-agnostic: the
# full ping URL is read from the environment (provision a check in the
# healthchecks LXC and export its URL, mirroring the service_deadman
# DEADMAN_HC_URL_* convention). Empty => ping skipped, all other behaviour
# unchanged.
hermes_agent_brain_watchdog_healthcheck_url: >-
  {{ lookup('env', 'DEADMAN_HC_URL_HERMES_BRAIN') | default('', true) }}

# --- Brain runtime source: OpenBao, no converge needed to re-point ----------
# tofu/Ansible seed the STARTING brain (ai_default_model, config.yaml.j2) but
# do not OWN it: this timer polls the ai-public OpenBao domain's non-secret
# secret/ai/public/brain (field active_model — see roles/openbao_secrets) and,
# only when the value both CHANGED and validates live against the router's
# own /v1/model/info (a tuned entry with a real max_input_tokens — never the
# "*" wildcard passthrough; the same compress-death-trap guard as
# roles/llm_router/tasks/assert.yml, but checked against the RUNNING router,
# not a converge-time snapshot), rewrites config.yaml's model.default and
# restarts hermes-gateway. Runs as ROOT on its own timer/env-file, deliberately
# separate from the hermes user's own gateway process and .env — the OpenBao
# AppRole credential below must never enter the agent's own environment,
# where an injected prompt could someday try to read it (same blast-radius
# reasoning as the LXC / non-root-user split at the top of this file).
# Disabling this falls back to converge-time-only re-pointing (pre-2026-07-18
# behavior) — a poll failure always just keeps the currently-running brain,
# so there is no OpenBao hard-dependency either way.
#
# Deliberately NOT extended to hermes_agent_compression_model (pinned to a
# literal on purpose — see its own comment: a brain repoint must not silently
# drag the >=64K-context compression path with it) or to
# hermes_agent_memory_llm_model (only rendered under the local_embedded
# Hindsight mode, which is not the live default — see hindsight-config.json.j2
# and hermes_agent_memory_mode; extend brain-sync to it if that mode returns).
hermes_agent_brain_sync_enabled: true
hermes_agent_brain_sync_script_path: /usr/local/bin/hermes-brain-sync.sh
hermes_agent_brain_sync_env_path: /etc/hermes-brain-sync.env
hermes_agent_brain_sync_state_dir: /etc/hermes-brain-sync
hermes_agent_brain_sync_state_file: "{{ hermes_agent_brain_sync_state_dir }}/current-model"
# 5 minutes: cheap enough for a KV read + one /v1/model/info probe, and "no
# rebuild" only has to mean minutes — this polls a value an OPERATOR changes
# deliberately, not a live-health signal (contrast the watchdog's 60s).
hermes_agent_brain_sync_interval: "5min"
# KV v2 data path (mount: secret) + field — see roles/openbao_secrets
# openbao_secrets_domains (ai-public) and inventory/group_vars/all.yml
# (hermes_brain_model). Still the SHARED ai/public/brain key: this PR decouples
# only the converge-time literal (hermes_brain_model), not the runtime key, so a
# live override keeps moving Hermes and ai_default together as it does today.
# The dedicated secret/ai/public/hermes-brain key is a follow-up (seed it first,
# then repoint here) — see the hermes_brain_model note in group_vars/all.yml.
hermes_agent_brain_sync_bao_path: ai/public/brain
hermes_agent_brain_sync_bao_field: active_model
# ponytail: single endpoint, no client-side failover on the guest (unlike the
# controller's openbao_secrets probe-and-pin across every openbao-tagged
# node). Reuses whichever address the controller itself pinned this converge;
# add the same candidate-list/probe logic here if guest-side OpenBao HA is
# ever needed.
hermes_agent_brain_sync_bao_addr: >-
  {{ hostvars['localhost'].openbao_secrets_active_addr
     | default(lookup('env', 'BAO_ADDR'), true) }}
# The ai-public domain's OWN AppRole (read-only on ai/public/*) — deliberately
# NOT local-llm's broader credential (see roles/openbao_secrets/README.md: a
# guest holding a live, reusable local-llm credential could pull every other
# ai/* secret, not just the ones already baked into its own .env). Empty
# until the companion AppRole/policy exists in ansible-proxmox-apps, at which
# point the script skips cleanly every cycle — same "unconfigured domain"
# skip as the controller-side fetch.
hermes_agent_brain_sync_role_id: "{{ lookup('env', 'AI_PUBLIC_VAULT_ROLE_ID') | default('', true) }}"
hermes_agent_brain_sync_secret_id: "{{ lookup('env', 'AI_PUBLIC_VAULT_SECRET_ID') | default('', true) }}"

# --- Ship the hermes-* unit logs to the dedicated hermes Splunk index ---------
# The gateway (hermes) and the brain watchdog/sync units all log to the journal
# under a hermes-* programname. A dedicated rsyslog ruleset forwards just those
# lines over TCP to the hermes_agent AI ingest listener -> HAProxy -> Cribl
# Stream (ai_stamp) -> Splunk index=hermes. Mirrors the openbao_audit shipping
# pattern; the ruleset's `stop` keeps hermes lines off any syslog_forwarder
# catch-all so they never also double-ship into index=os.
hermes_agent_syslog_route_enabled: true
# Numbered 05- so the drop-in is evaluated before any 10-forward-cribl.conf
# catch-all rsyslog may render on this guest.
hermes_agent_syslog_rsyslog_config_path: /etc/rsyslog.d/05-hermes-agent.conf
hermes_agent_syslog_host: "syslog.{{ lookup('env', 'PROXMOX_SUBDOMAIN') }}"
# hermes_agent AI ingest port from tofu constants. Mandatory (not defaulted):
# the key is new, so no inventory predates it — fail loudly rather than ship to
# a guessed port.
hermes_agent_syslog_port: >-
  {{ tofu_data.constants.ai_log_routing.hermes_agent.port
     | mandatory('ai_log_routing.hermes_agent.port missing from tofu constants') }}
hermes_agent_syslog_queue_max_disk_space: 256m
