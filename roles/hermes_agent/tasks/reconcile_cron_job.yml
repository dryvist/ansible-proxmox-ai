---
- name: "Cron | Look up {{ item.name }}"
  ansible.builtin.command: "{{ hermes_agent_bin }} cron list --all"
  environment:
    HERMES_HOME: "{{ hermes_agent_hermes_home }}"
  become: true
  become_user: "{{ hermes_agent_user }}"
  register: hermes_agent_managed_cron_list
  changed_when: false
  when: item.enabled | default(true) | bool

- name: "Cron | Calculate desired state for {{ item.name }}"
  ansible.builtin.set_fact:
    hermes_agent_managed_cron_checksum: >-
      {{ {'schedule': item.schedule, 'prompt': item.prompt,
          'deliver': item.deliver, 'skills': item.skills | default([])}
         | to_json | hash('sha256') }}
  when: item.enabled | default(true) | bool

- name: "Cron | Check desired-state marker for {{ item.name }}"
  ansible.builtin.copy:
    content: "{{ hermes_agent_managed_cron_checksum }}\n"
    dest: "{{ hermes_agent_managed_cron_state_dir }}/{{ item.name }}.sha256"
    owner: "{{ hermes_agent_user }}"
    group: "{{ hermes_agent_user }}"
    mode: "0640"
  check_mode: true
  register: hermes_agent_managed_cron_marker_probe
  when: item.enabled | default(true) | bool

- name: "Cron | Create {{ item.name }}"
  ansible.builtin.command:
    argv: >-
      {{ [hermes_agent_bin, 'cron', 'create', item.schedule, item.prompt,
         '--name', item.name, '--deliver', item.deliver]
         + (item.skills | default([])
            | map('regex_replace', '^', '--skill=') | list) }}
  environment:
    HERMES_HOME: "{{ hermes_agent_hermes_home }}"
  become: true
  become_user: "{{ hermes_agent_user }}"
  changed_when: true
  when:
    - item.enabled | default(true) | bool
    - item.name not in (hermes_agent_managed_cron_list.stdout | default(''))

- name: "Cron | Reconcile {{ item.name }}"
  ansible.builtin.command:
    argv: >-
      {{ [hermes_agent_bin, 'cron', 'edit', item.name,
          '--schedule', item.schedule, '--prompt', item.prompt,
          '--deliver', item.deliver]
         + (item.skills | default([])
            | map('regex_replace', '^', '--skill=') | list) }}
  environment:
    HERMES_HOME: "{{ hermes_agent_hermes_home }}"
  become: true
  become_user: "{{ hermes_agent_user }}"
  changed_when: true
  when:
    - item.enabled | default(true) | bool
    - item.name in (hermes_agent_managed_cron_list.stdout | default(''))
    - hermes_agent_managed_cron_marker_probe.changed | bool

- name: "Cron | Record desired state for {{ item.name }}"
  ansible.builtin.copy:
    content: "{{ hermes_agent_managed_cron_checksum }}\n"
    dest: "{{ hermes_agent_managed_cron_state_dir }}/{{ item.name }}.sha256"
    owner: "{{ hermes_agent_user }}"
    group: "{{ hermes_agent_user }}"
    mode: "0640"
  when: item.enabled | default(true) | bool
