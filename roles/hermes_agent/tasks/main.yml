---
# NousResearch Hermes Agent — native install + headless gateway daemon. Idempotent.
#
# The agent runs arbitrary terminal + web tools, so it runs as a NON-root dedicated
# user; the LXC is the blast-radius boundary. Ansible owns the PLATFORM (user,
# install, config, systemd); the Hermes daemon owns its own app lifecycle
# (`hermes update`) — install once behind a `creates` guard and never pin a moving
# 'latest' (Agy: avoids the self-update vs idempotency conflict).
#
# NOT YET LIVE-VALIDATED (verify on first converge): (a) install.sh running clean
# non-interactively as root on a minimal Debian LXC; (b) `hermes gateway run
# --replace` staying up headless with no messaging platform; (c) Hindsight
# provider init from config.yaml alone (it may need its client package on
# first run).

# Layer 1 — render-time contract assertions. Imported FIRST so a known-bad brain
# config (context below the 64k floor, inverted timeout chain) fails the play
# before anything is installed or deployed. Inherits the play's hermes_agent tag.
- name: Assert brain-wiring contracts before converging
  ansible.builtin.import_tasks: assert.yml

- name: Build the pinned prompt catalog on the controller
  ansible.builtin.command:
    cmd: >-
      nix build --out-link /tmp/hermes-agent-prompts --print-out-paths
      "{{ hermes_agent_prompts_flake_ref }}"
  delegate_to: localhost
  become: false
  vars:
    ansible_become: false
  run_once: true
  register: hermes_agent_prompts_build
  changed_when: false

- name: Resolve the prompt catalog package path
  ansible.builtin.set_fact:
    hermes_agent_prompts_path: >-
      {{ hermes_agent_prompts_build.stdout_lines | last
         }}/share/ai-llm-prompts/auto-ai-agent

- name: Load active Hermes prompts from the immutable catalog
  ansible.builtin.set_fact:
    hermes_agent_daily_status_cron_prompt: >-
      {{ lookup('ansible.builtin.file', hermes_agent_prompts_path ~ '/'
         ~ hermes_agent_daily_status_cron_prompt_file, rstrip=false)
         | regex_replace('(?s)^---\n.*?\n---\n', '') | trim }}
    hermes_agent_nightly_wiki_cron_prompt: >-
      {{ lookup('ansible.builtin.file', hermes_agent_prompts_path ~ '/'
         ~ hermes_agent_nightly_wiki_cron_prompt_file, rstrip=false)
         | regex_replace('(?s)^---\n.*?\n---\n', '') | trim }}
    hermes_agent_splunk_triage_cron_prompt: >-
      {{ lookup('ansible.builtin.file', hermes_agent_prompts_path ~ '/'
         ~ hermes_agent_splunk_triage_cron_prompt_file, rstrip=false)
         | regex_replace('(?s)^---\n.*?\n---\n', '') | trim }}
    hermes_agent_splunk_security_cron_prompt: >-
      {{ lookup('ansible.builtin.file', hermes_agent_prompts_path ~ '/'
         ~ hermes_agent_splunk_security_cron_prompt_file, rstrip=false)
         | regex_replace('(?s)^---\n.*?\n---\n', '') | trim }}
    hermes_agent_splunk_parsing_cron_prompt: >-
      {{ lookup('ansible.builtin.file', hermes_agent_prompts_path ~ '/'
         ~ hermes_agent_splunk_parsing_cron_prompt_file, rstrip=false)
         | regex_replace('(?s)^---\n.*?\n---\n', '') | trim }}
    hermes_agent_splunk_deepdive_cron_prompt: >-
      {{ lookup('ansible.builtin.file', hermes_agent_prompts_path ~ '/'
         ~ hermes_agent_splunk_deepdive_cron_prompt_file, rstrip=false)
         | regex_replace('(?s)^---\n.*?\n---\n', '') | trim }}
    hermes_agent_splunk_digest_cron_prompt: >-
      {{ lookup('ansible.builtin.file', hermes_agent_prompts_path ~ '/'
         ~ hermes_agent_splunk_digest_cron_prompt_file, rstrip=false)
         | regex_replace('(?s)^---\n.*?\n---\n', '') | trim }}
    hermes_agent_github_monitor_cron_prompt: >-
      {{ lookup('ansible.builtin.file', hermes_agent_prompts_path ~ '/'
         ~ hermes_agent_github_monitor_cron_prompt_file, rstrip=false)
         | regex_replace('(?s)^---\n.*?\n---\n', '') | trim }}
    hermes_agent_webhook_prompt: >-
      {{ lookup('ansible.builtin.file', hermes_agent_prompts_path ~ '/'
         ~ hermes_agent_webhook_prompt_file, rstrip=false)
         | regex_replace('(?s)^---\n.*?\n---\n', '') | trim }}
    hermes_agent_bot_pr_triage_cron_prompt: >-
      {{ lookup('ansible.builtin.file', hermes_agent_prompts_path ~ '/'
         ~ hermes_agent_bot_pr_triage_cron_prompt_file, rstrip=false)
         | regex_replace('(?s)^---\n.*?\n---\n', '') | trim }}
    hermes_agent_docs_sync_cron_prompt: >-
      {{ lookup('ansible.builtin.file', hermes_agent_prompts_path ~ '/'
         ~ hermes_agent_docs_sync_cron_prompt_file, rstrip=false)
         | regex_replace('(?s)^---\n.*?\n---\n', '') | trim }}

- name: Assert every curriculum prompt resolves from the catalog
  ansible.builtin.assert:
    quiet: true
    that:
      - item.id in hermes_agent_curriculum_prompt_files
      - >-
        (hermes_agent_prompts_path ~ '/'
         ~ hermes_agent_curriculum_prompt_files[item.id]) is file
    fail_msg: >-
      Curriculum job '{{ item.id }}' has no prompt in the pinned catalog package.
  loop: "{{ hermes_agent_curriculum.jobs }}"
  loop_control:
    label: "{{ item.id }}"

- name: Install role prerequisites (installer + clone)
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - git
      - sudo
      - jq # hermes-brain-sync.sh JSON parsing (OpenBao KV, router /v1/model/info)
    state: present
    update_cache: true
    cache_valid_time: 3600

# Fetch the installer from the pinned release tag's immutable raw URL and verify
# its sha256 BEFORE running it — no `curl <url> | bash` of a moving remote script.
# A checksum mismatch (upstream changed the tag, MITM, rug-pull) fails here, loud.
- name: Fetch the pinned Hermes installer (checksum-verified)
  ansible.builtin.get_url:
    url: "{{ hermes_agent_installer_url }}"
    dest: "{{ hermes_agent_installer_path }}"
    checksum: "sha256:{{ hermes_agent_installer_sha256 }}"
    owner: root
    group: root
    mode: "0644"

# Run the VERIFIED local installer (root + play become: true) -> system-wide FHS
# layout: binary /usr/local/bin/hermes, code /usr/local/lib/hermes-agent. Do NOT
# pass --dir: an explicit dir disables the root-FHS auto-layout and drops the
# launcher in /root/.local/bin instead of /usr/local/bin (breaks hermes_agent_bin).
# --branch {{ version }}: the installer git-clones the app at this release TAG
# (`git clone --depth 1 --branch <tag>`), pinning the app checkout too. The
# installer handles its own Python/uv/venv/Node/ripgrep/ffmpeg deps.
# `creates` guard installs once; the Hermes daemon self-updates the app after.
# --skip-setup: the installer's final step is an INTERACTIVE `hermes setup` wizard
# that reads /dev/tty and hangs forever under Ansible (no controlling TTY). We skip
# it and configure declaratively via the config.yaml/.env templates below;
# --non-interactive defaults any remaining prompt instead of blocking.
- name: Install Hermes Agent system-wide (once; daemon self-updates thereafter)
  ansible.builtin.command:
    cmd: >-
      bash {{ hermes_agent_installer_path }}
      --branch {{ hermes_agent_version }} --skip-setup --non-interactive
    creates: "{{ hermes_agent_bin }}"

# Upstream bug (NousResearch/hermes-agent, agent/conversation_loop.py):
# the length-continuation and truncated-tool-call retry paths boost
# max_tokens on each retry, but floor the boost ceiling at
# `max(32768, requested_cap)` — so when the configured output cap is set
# below that hardcoded 32768 floor (as `model.max_tokens` was at 8192
# historically), the first truncation retry re-sends a request above the
# ceiling, which a server enforcing a lower per-request limit 400s
# identically ("max_tokens exceeds server limit"), burning all retries and
# surfacing the error instead of completing. The patch holds the boost at the
# configured 8192-token ceiling.
# `agent.max_tokens` is already the user's explicit config-level ceiling;
# treat it as absolute instead of a floor for the boost. Runs every
# converge (idempotent regexp match) because `hermes update` self-updates
# the app out from under this checkout and would silently drop the patch
# otherwise.
- name: Patch hermes-agent retry boost to respect the configured max_tokens ceiling
  ansible.builtin.replace:
    path: "{{ hermes_agent_install_dir }}/agent/conversation_loop.py"
    regexp: '^(\s*)_tc_boost_cap = max\(32768, _tc_requested_cap or 0\)$'
    replace: '\1_tc_boost_cap = agent.max_tokens if agent.max_tokens else max(32768, _tc_requested_cap or 0)'
  notify: Restart hermes-gateway

- name: Patch hermes-agent length-continuation boost to respect the configured max_tokens ceiling
  ansible.builtin.replace:
    path: "{{ hermes_agent_install_dir }}/agent/conversation_loop.py"
    regexp: '^(\s*)_boost_cap = max\(32768, _requested_cap or 0\)$'
    replace: '\1_boost_cap = agent.max_tokens if agent.max_tokens else max(32768, _requested_cap or 0)'
  notify: Restart hermes-gateway

# The compressor can retain an end offset computed before tool-message cleanup.
# Clamp it to the current list length so scheduled runs do not abort on IndexError.
- name: Patch hermes-agent context summary scan to use the live message bound
  ansible.builtin.replace:
    path: "{{ hermes_agent_install_dir }}/agent/context_compressor.py"
    regexp: '^(\s*)for idx in range\(end - 1, start - 1, -1\):$'
    replace: '\1for idx in range(min(end, len(messages)) - 1, start - 1, -1):'
  notify: Restart hermes-gateway

# Pinned Hermes returns four values from judge_goal, while kanban_complete still
# unpacks the former three-value contract. The caught ValueError silently makes
# the completion gate fail open. Keep the installed source consistent until the
# pinned release includes the upstream fix.
- name: Patch Hermes goal completion gate for the four-value judge result
  ansible.builtin.replace:
    path: "{{ hermes_agent_install_dir }}/tools/kanban_tools.py"
    regexp: '^([ \t]*)verdict, reason, _ = judge_goal\($'
    replace: '\1verdict, reason, _, _ = judge_goal('
  notify: Restart hermes-gateway

- name: Patch Hermes goal judge timeout for the local light tier
  ansible.builtin.replace:
    path: "{{ hermes_agent_install_dir }}/hermes_cli/goals.py"
    regexp: '^DEFAULT_JUDGE_TIMEOUT = [0-9]+(?:\.[0-9]+)?$'
    replace: 'DEFAULT_JUDGE_TIMEOUT = {{ hermes_agent_kanban_goal_judge_timeout_seconds | float }}'
  notify: Restart hermes-gateway

- name: Patch Hermes exception retry delay for the local serial backend
  ansible.builtin.replace:
    path: "{{ hermes_agent_install_dir }}/agent/conversation_loop.py"
    regexp: >-
      ^([ \t]*)wait_time = _retry_after if _retry_after else
      jittered_backoff\(retry_count, base_delay=2\.0, max_delay=60\.0\)$
    replace: '\g<1>wait_time = 15.0'
  notify: Restart hermes-gateway

- name: Patch Hermes invalid-response retry delay for the local serial backend
  ansible.builtin.replace:
    path: "{{ hermes_agent_install_dir }}/agent/conversation_loop.py"
    regexp: '^([ \t]*)wait_time = jittered_backoff\(retry_count, base_delay=5\.0, max_delay=120\.0\)$'
    replace: '\g<1>wait_time = 15.0'
  notify: Restart hermes-gateway

- name: Disable adaptive rate-limit backoff for the local serial backend
  ansible.builtin.replace:
    path: "{{ hermes_agent_install_dir }}/agent/conversation_loop.py"
    regexp: >-
      ^([ \t]*)if (?:is_rate_limited|\(is_rate_limited or
      _is_zai_coding_overload\)) and not _retry_after:$
    replace: '\g<1>if False and is_rate_limited and not _retry_after:'
  notify: Restart hermes-gateway

- name: Disable the extra transport-recovery attempt cycle
  ansible.builtin.replace:
    path: "{{ hermes_agent_install_dir }}/agent/conversation_loop.py"
    regexp: '^([ \t]*)if not _retry\.primary_recovery_attempted and agent\._try_recover_primary_transport\($'
    replace: '\g<1>if False and not _retry.primary_recovery_attempted and agent._try_recover_primary_transport('
  notify: Restart hermes-gateway

- name: Patch Hermes auxiliary retry delay for the local serial backend
  ansible.builtin.replace:
    path: "{{ hermes_agent_install_dir }}/agent/auxiliary_client.py"
    regexp: '^_TRANSIENT_RETRY_BACKOFF_BASE = 1\.0$'
    replace: '_TRANSIENT_RETRY_BACKOFF_BASE = 15.0'
  notify: Restart hermes-gateway

- name: Retry auxiliary rate limits through the bounded transient path
  ansible.builtin.replace:
    path: "{{ hermes_agent_install_dir }}/agent/auxiliary_client.py"
    regexp: 'return isinstance\(status, int\) and \(status == 408 or 500 <= status < 600\)'
    replace: 'return isinstance(status, int) and (status in (408, 429) or 500 <= status < 600)'
  notify: Restart hermes-gateway

- name: Disable post-budget fallback for the explicit local auxiliary provider
  ansible.builtin.replace:
    path: "{{ hermes_agent_install_dir }}/agent/auxiliary_client.py"
    regexp: '^([ \t]*)if should_fallback and \(is_auto or is_capacity_error\):$'
    replace: '\g<1>if should_fallback and (is_auto or (is_capacity_error and resolved_provider != "custom")):'
  notify: Restart hermes-gateway

- name: Enable prompt-safe Hermes request size metrics at DEBUG
  ansible.builtin.replace:
    path: "{{ hermes_agent_install_dir }}/agent/conversation_loop.py"
    regexp: '([ \t]+# Log request details if verbose\n)[ \t]+if agent\.verbose_logging:'
    replace: '\g<1>        if True:'
  notify: Restart hermes-gateway

- name: Enable prompt-safe Hermes token usage metrics at DEBUG
  ansible.builtin.replace:
    path: "{{ hermes_agent_install_dir }}/agent/conversation_loop.py"
    regexp: '^([ \t]*)(?:if agent\.verbose_logging|if True):\n[ \t]+logging\.debug\(f"Token usage:'
    replace: '                    if True:\n                        logging.debug(f"Token usage:'
  notify: Restart hermes-gateway

# The dispatcher sets HERMES_KANBAN_GOAL_MODE, but the pinned CLI only invokes
# its goal-loop wrapper on the machine-readable quiet path. Without --quiet,
# workers take the ordinary single-query path, return text, and exit rc=0 while
# their card remains running.
- name: Patch Hermes Kanban workers to enter the quiet goal-loop path
  ansible.builtin.replace:
    path: "{{ hermes_agent_install_dir }}/hermes_cli/kanban_db.py"
    regexp: '^([ \t]*)(?:\*\(\["--quiet"\] if task\.goal_mode else \[\]\),\n\1)*"-q", prompt,$'
    replace: |-
      \1*(["--quiet"] if task.goal_mode else []),
      \1"-q", prompt,
  notify: Restart hermes-gateway

# An idempotency hit returns before create_task applies new fields. Upgrade only
# active goal-enabled repeats in place so a current-slot card is reconciled
# without mutating completed history or downgrading an existing goal card.
- name: Patch Hermes idempotent create to reconcile goal-mode fields
  ansible.builtin.replace:
    path: "{{ hermes_agent_install_dir }}/hermes_cli/kanban_db.py"
    regexp: |-
      ^([ \t]*)row = conn\.execute\($
      \1    "SELECT id FROM tasks WHERE idempotency_key = \? "$
      \1    "AND status != 'archived' "$
      \1    "ORDER BY created_at DESC LIMIT 1",$
      \1    \(idempotency_key,\),$
      \1\)\.fetchone\(\)$
      \1if row:$
      \1    return row\["id"\]$
    replace: |-
      \1row = conn.execute(
      \1    "SELECT id, status FROM tasks WHERE idempotency_key = ? "
      \1    "AND status != 'archived' "
      \1    "ORDER BY created_at DESC LIMIT 1",
      \1    (idempotency_key,),
      \1).fetchone()
      \1if row:
      \1    if goal_mode and row["status"] in ("triage", "todo", "scheduled", "ready", "blocked", "review"):
      \1        with write_txn(conn):
      \1            conn.execute(
      \1                "UPDATE tasks SET goal_mode = 1, "
      \1                "goal_max_turns = COALESCE(?, goal_max_turns) "
      \1                "WHERE id = ? AND status IN "
      \1                "('triage', 'todo', 'scheduled', 'ready', 'blocked', 'review')",
      \1                (int(goal_max_turns) if goal_max_turns is not None else None, row["id"]),
      \1            )
      \1    return row["id"]
  notify: Restart hermes-gateway

- name: Read installed Hermes goal-mode source patches
  ansible.builtin.slurp:
    src: "{{ item }}"
  loop:
    - "{{ hermes_agent_install_dir }}/tools/kanban_tools.py"
    - "{{ hermes_agent_install_dir }}/hermes_cli/kanban_db.py"
    - "{{ hermes_agent_install_dir }}/hermes_cli/goals.py"
    - "{{ hermes_agent_install_dir }}/agent/conversation_loop.py"
    - "{{ hermes_agent_install_dir }}/agent/auxiliary_client.py"
  register: hermes_agent_goal_mode_sources
  changed_when: false

- name: Assert installed Hermes goal-mode source patches
  vars:
    hermes_agent_goal_completion_source: >-
      {{ hermes_agent_goal_mode_sources.results[0].content | b64decode }}
    hermes_agent_goal_reconcile_source: >-
      {{ hermes_agent_goal_mode_sources.results[1].content | b64decode }}
    hermes_agent_goal_judge_source: >-
      {{ hermes_agent_goal_mode_sources.results[2].content | b64decode }}
    hermes_agent_retry_source: >-
      {{ hermes_agent_goal_mode_sources.results[3].content | b64decode }}
    hermes_agent_auxiliary_source: >-
      {{ hermes_agent_goal_mode_sources.results[4].content | b64decode }}
  ansible.builtin.assert:
    quiet: true
    that:
      - "'verdict, reason, _, _ = judge_goal(' in hermes_agent_goal_completion_source"
      - >-
        hermes_agent_goal_reconcile_source.count(
          '*(["--quiet"] if task.goal_mode else []),'
        ) == 1
      - >-
        hermes_agent_goal_reconcile_source.count(
          '"-q", prompt,'
        ) == 1
      - >-
        'SELECT id, status FROM tasks WHERE idempotency_key = ?'
        in hermes_agent_goal_reconcile_source
      - >-
        'if goal_mode and row["status"] in ("triage", "todo", "scheduled", "ready", "blocked", "review"):'
        in hermes_agent_goal_reconcile_source
      - >-
        'goal_max_turns = COALESCE(?, goal_max_turns)'
        in hermes_agent_goal_reconcile_source
      - >-
        'WHERE id = ? AND status IN'
        in hermes_agent_goal_reconcile_source
      - >-
        "('triage', 'todo', 'scheduled', 'ready', 'blocked', 'review')"
        in hermes_agent_goal_reconcile_source
      - >-
        ('DEFAULT_JUDGE_TIMEOUT = '
         ~ (hermes_agent_kanban_goal_judge_timeout_seconds | float | string))
        in hermes_agent_goal_judge_source
      - "hermes_agent_retry_source.count('wait_time = 15.0') >= 2"
      - >-
        'if False and is_rate_limited and not _retry_after:'
        in hermes_agent_retry_source
      - >-
        'if False and not _retry.primary_recovery_attempted and agent._try_recover_primary_transport('
        in hermes_agent_retry_source
      - >-
        '# Log request details if verbose\n        if True:'
        in hermes_agent_retry_source
      - >-
        'if True:\n                        logging.debug(f"Token usage:'
        in hermes_agent_retry_source
      - >-
        '_TRANSIENT_RETRY_BACKOFF_BASE = 15.0'
        in hermes_agent_auxiliary_source
      - >-
        'status in (408, 429)'
        in hermes_agent_auxiliary_source
      - >-
        'resolved_provider != "custom"'
        in hermes_agent_auxiliary_source
    fail_msg: >-
      The pinned Hermes source changed and one or more required goal-mode
      patches were not installed; update the pinned-source patches before
      converging.

- name: Check whether the Hermes OTEL plugin file exists
  ansible.builtin.stat:
    path: "{{ hermes_agent_install_dir }}/plugins/observability/otel/__init__.py"
  register: hermes_agent_otel_plugin

- name: Patch Hermes OTEL spans to carry the configured service name
  ansible.builtin.replace:
    path: "{{ hermes_agent_install_dir }}/plugins/observability/otel/__init__.py"
    regexp: '^(\s*)attrs = \[_attr\(_GEN_AI_SESSION, session_id\), _attr\(_GEN_AI_EXECUTION, exec_id\)\]$'
    replace: >-
      \1attrs = [_attr(_GEN_AI_SESSION, session_id),
      _attr(_GEN_AI_EXECUTION, exec_id),
      _attr("service.name", os.environ.get("OTEL_SERVICE_NAME", "hermes-agent"))]
  notify: Restart hermes-gateway
  when: hermes_agent_otel_plugin.stat.exists

# The base install skips optional messaging-platform extras (they pull in
# platform SDKs like slack-bolt that most converges never need). Without this,
# the gateway logs "Platform 'Slack' requirements not met" and refuses to
# create the Slack adapter even with valid tokens configured. `uv pip install`
# is a no-op re-run when already satisfied; changed_when keys off its own
# "Installed"/"Uninstalled" summary line so idempotency reporting stays honest.
# uv writes that summary to STDERR, not stdout — check stderr (an empty-repo
# reinstall of nothing leaves both blank, correctly reporting ok/unchanged).
- name: Install the Slack platform extra into the Hermes venv
  ansible.builtin.command:
    cmd: >-
      {{ hermes_agent_uv_bin }} pip install
      --python {{ hermes_agent_venv_python }}
      "hermes-agent[slack] @ {{ hermes_agent_install_dir }}"
  register: hermes_agent_slack_extra_install
  changed_when: >-
    'Installed' in hermes_agent_slack_extra_install.stderr
    or 'Uninstalled' in hermes_agent_slack_extra_install.stderr
  when: hermes_agent_slack_bot_token | length > 0 and hermes_agent_slack_app_token | length > 0
- name: Create the hermes runtime user (HERMES_HOME on the data volume)
  ansible.builtin.user:
    name: "{{ hermes_agent_user }}"
    home: "{{ hermes_agent_home }}"
    system: true
    shell: /bin/bash # the agent's terminal tool needs a real shell
    create_home: true

# The home is a pre-existing ZFS data-volume mount (deployment.json mount_point),
# so `create_home` above is a no-op for it — the dir already exists, owned by
# root:root from the mount. Claim it for the hermes user explicitly, or the agent
# can't write its own $HOME (shell sessions, tool scratch, hermes self-update).
- name: Ensure the hermes home directory is owned by the runtime user
  ansible.builtin.file:
    path: "{{ hermes_agent_home }}"
    state: directory
    owner: "{{ hermes_agent_user }}"
    group: "{{ hermes_agent_user }}"
    mode: "0750"

- name: Ensure HERMES_HOME exists
  ansible.builtin.file:
    path: "{{ hermes_agent_hermes_home }}"
    state: directory
    owner: "{{ hermes_agent_user }}"
    group: "{{ hermes_agent_user }}"
    mode: "0750"

- name: Ensure managed cron state directory exists
  ansible.builtin.file:
    path: "{{ hermes_agent_managed_cron_state_dir }}"
    state: directory
    owner: "{{ hermes_agent_user }}"
    group: "{{ hermes_agent_user }}"
    mode: "0750"

- name: Deploy the Hermes secrets file (.env)
  ansible.builtin.template:
    src: hermes-env.j2
    dest: "{{ hermes_agent_hermes_home }}/.env"
    owner: "{{ hermes_agent_user }}"
    group: "{{ hermes_agent_user }}"
    mode: "0600"
  no_log: true
  notify: Restart hermes-gateway

- name: Deploy the Hermes config.yaml (brain -> LiteLLM router, memory -> Hindsight, budget)
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ hermes_agent_hermes_home }}/config.yaml"
    owner: "{{ hermes_agent_user }}"
    group: "{{ hermes_agent_user }}"
    mode: "0640"
  notify: Restart hermes-gateway

# --- nix-hermes content bundle: SOUL.md + the dryvist skills ------------------
# Content is built by the pinned nix-hermes flake ref on the CONTROLLER (the
# only side with nix; the guest never needs it) and byte-copied over. First
# build needs network; the nix store caches re-runs. changed_when: false —
# building never mutates the guest.
- name: Build the nix-hermes content bundle on the controller
  ansible.builtin.command:
    cmd: nix build --no-link --print-out-paths "{{ hermes_agent_bundle_flake_ref }}"
  delegate_to: localhost
  # See assert.yml: the ansible_become connection var outranks the keyword.
  become: false
  vars:
    ansible_become: false
  run_once: true
  register: hermes_agent_bundle_build
  changed_when: false

- name: Resolve the nix-hermes bundle store path
  ansible.builtin.set_fact:
    hermes_agent_bundle_path: "{{ hermes_agent_bundle_build.stdout_lines | last }}"

# SOUL.md = the persona/behavior surface upstream loads FRESH on every message
# (no restart needed) — the role the AGENTS.md chain plays for Claude Code.
# The bundle composes it at BUILD time from ai-assistant-instructions'
# agentsmd/prompts/autonomous-base.md + nix-hermes data/soul/hermes-variant.md
# (edit intent in those sources, never a vendored copy here). Ansible owns the
# file; Hermes self-edits MEMORY.md, not SOUL.md, so no agent-written state is
# overwritten. backup:true preserves the pre-management content once on first
# converge.
- name: Deploy the Hermes SOUL.md (shared behavioral base + Hermes variant)
  ansible.builtin.copy:
    src: "{{ hermes_agent_bundle_path }}/SOUL.md"
    dest: "{{ hermes_agent_hermes_home }}/SOUL.md"
    owner: "{{ hermes_agent_user }}"
    group: "{{ hermes_agent_user }}"
    mode: "0644"
    backup: true
  when: hermes_agent_soul_managed | bool

# --- Hindsight memory: local embedded daemon ---------------------------------
# The provider name in config.yaml is not enough: hindsight defaults to CLOUD
# mode, and with no HINDSIGHT_API_KEY its is_available() is false — every
# memory tool call fails with "Memory is not available" (the recurring digest
# warning). local_embedded needs (a) the hindsight-all package in the venv,
# (b) $HERMES_HOME/hindsight/config.json selecting the mode + the extraction
# LLM (the same router brain), (c) HINDSIGHT_LLM_API_KEY in .env (rendered by
# hermes-env.j2).
# local_embedded needs the full daemon stack (hindsight-all, ~200 MB);
# local_external only needs the pinned HTTP client the plugin drives.
- name: Install the Hindsight stack into the Hermes venv
  ansible.builtin.command:
    cmd: >-
      {{ hermes_agent_uv_bin }} pip install
      --python {{ hermes_agent_venv_python }}
      {{ 'hindsight-all' if hermes_agent_memory_mode == 'local_embedded' else '' }}
      "hindsight-client{{ hermes_agent_hindsight_client_pin }}"
  register: hermes_agent_hindsight_install
  changed_when: >-
    'Installed' in hermes_agent_hindsight_install.stderr
    or 'Uninstalled' in hermes_agent_hindsight_install.stderr
  when: hermes_agent_memory_provider == 'hindsight'
  notify: Restart hermes-gateway

- name: Ensure the hindsight config dir exists
  ansible.builtin.file:
    path: "{{ hermes_agent_hermes_home }}/hindsight"
    state: directory
    owner: "{{ hermes_agent_user }}"
    group: "{{ hermes_agent_user }}"
    mode: "0750"
  when: hermes_agent_memory_provider == 'hindsight'

- name: Deploy the hindsight provider config (mode + embedded-daemon LLM)
  ansible.builtin.template:
    src: hindsight-config.json.j2
    dest: "{{ hermes_agent_hermes_home }}/hindsight/config.json"
    owner: "{{ hermes_agent_user }}"
    group: "{{ hermes_agent_user }}"
    mode: "0640"
  notify: Restart hermes-gateway
  when: hermes_agent_memory_provider == 'hindsight'

# --- Guest SSH hardening ------------------------------------------------------
# Flagged by the agent's own security self-audit: password auth was accepted on
# the guest's sshd. Ansible reaches this guest via proxmox_pct_remote (through
# the PVE host), not sshd, so this cannot lock out converges.
- name: Disable SSH password authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication\s'
    line: PasswordAuthentication no
    validate: /usr/sbin/sshd -t -f %s
  notify: Restart sshd

# --- Cron model-drift recovery ------------------------------------------------
# Unpinned AGENTIC cron jobs snapshot the global default model at creation and
# FAIL CLOSED when model.default later changes (upstream spend guard, hermes-agent
# #44585). Post-migration the seeded fleet is script-only `--no-agent` enqueuers,
# which carry no model_snapshot at all — the `model_snapshot`-defined filter below
# skips them, so this task is a self-correcting no-op for the current fleet. It is
# retained so any future agentic seeded job is still auto-recovered on a repoint:
# remove the drifted job here and let create-if-absent seeding recreate it,
# snapshotting the new model. No drift means nothing is removed (idempotent).
- name: Read the cron job store to detect model-snapshot drift
  ansible.builtin.slurp:
    src: "{{ hermes_agent_hermes_home }}/cron/jobs.json"
  register: hermes_agent_cron_store
  failed_when: false

- name: Remove role-seeded cron jobs whose model snapshot drifted
  ansible.builtin.command: "{{ hermes_agent_bin }} cron remove {{ item }}"
  environment:
    HERMES_HOME: "{{ hermes_agent_hermes_home }}"
  become: true
  become_user: "{{ hermes_agent_user }}"
  # The loop expression is templated before `when` would be evaluated
  # (per-item semantics), so it must be self-safe: default the slurped
  # content to base64("{}") when jobs.json does not exist yet (fresh
  # install) — the loop resolves to [] and the task is a no-op.
  loop: >-
    {{ (hermes_agent_cron_store.content | default('e30=', true) | b64decode | from_json).jobs
       | default([])
       | selectattr('name', 'in', hermes_agent_seeded_cron_names)
       | selectattr('model_snapshot', 'defined')
       | rejectattr('model_snapshot', 'none')
       | rejectattr('model_snapshot', 'equalto', hermes_agent_model)
       | map(attribute='name') | list }}
  changed_when: true

# One-time (but idempotent) migration cleanup (#83): a guest provisioned before
# the Kanban migration still runs the OLD bare-named agentic crons. The drift GC
# above only matches the new `-enqueue` names, so those old crons would linger
# and double-fire alongside their enqueuer twins. Remove any superseded bare
# name that is actually present in the store. Reuses the slurp above (the drift
# task only touches `-enqueue` names, so the bare-name view is still accurate);
# self-safe base64("{}") default makes a missing jobs.json a no-op. Empty loop
# after the first converge -> idempotent.
- name: "Remove superseded pre-migration agentic cron jobs (kanban migration #83)"
  ansible.builtin.command: "{{ hermes_agent_bin }} cron remove {{ item }}"
  environment:
    HERMES_HOME: "{{ hermes_agent_hermes_home }}"
  become: true
  become_user: "{{ hermes_agent_user }}"
  loop: >-
    {{ (hermes_agent_cron_store.content | default('e30=', true) | b64decode | from_json).jobs
       | default([])
       | map(attribute='name') | list
       | select('in', hermes_agent_superseded_agentic_cron_names) | list }}
  changed_when: true

# The recurring agentic workloads (daily status, operator summary, Zammad
# review, Splunk fleet, GitHub triage, nightly wiki) are dispatched as Kanban
# cards now, not agentic crons (kanban migration, #83). They are enqueued by the
# script-only `--no-agent` cron fleet reconciled after the skills/prompts are in
# place (see "Kanban enqueuer fleet" below).

- name: Ensure the wiki directory exists
  ansible.builtin.file:
    path: "{{ hermes_agent_wiki_path }}"
    state: directory
    owner: "{{ hermes_agent_user }}"
    group: "{{ hermes_agent_user }}"
    mode: "0750"
  when: hermes_agent_wiki_enabled | bool

- name: Materialize llm-wiki skill
  ansible.builtin.copy:
    src: "{{ hermes_agent_install_dir }}/skills/research/llm-wiki"
    dest: "{{ hermes_agent_hermes_home }}/skills/"
    remote_src: true
    owner: "{{ hermes_agent_user }}"
    group: "{{ hermes_agent_user }}"
    mode: preserve
  when: hermes_agent_wiki_enabled | bool

- name: Deploy the GitHub App private key
  ansible.builtin.copy:
    content: "{{ hermes_agent_github_app_private_key }}"
    dest: "{{ hermes_agent_hermes_home }}/github-app.pem"
    owner: "{{ hermes_agent_user }}"
    group: "{{ hermes_agent_user }}"
    mode: "0600"
  no_log: true
  when: hermes_agent_github_app_private_key | length > 0

- name: Install githubkit into the Hermes venv
  ansible.builtin.command:
    cmd: >-
      {{ hermes_agent_uv_bin }} pip install
      --python {{ hermes_agent_venv_python }}
      'githubkit[auth-app]'
  register: hermes_agent_githubkit_install
  changed_when: >-
    'Installed' in hermes_agent_githubkit_install.stderr
    or 'Uninstalled' in hermes_agent_githubkit_install.stderr
  when: hermes_agent_github_app_private_key | length > 0

- name: Materialize upstream github skills
  ansible.builtin.copy:
    src: "{{ hermes_agent_install_dir }}/skills/github"
    dest: "{{ hermes_agent_hermes_home }}/skills/"
    remote_src: true
    owner: "{{ hermes_agent_user }}"
    group: "{{ hermes_agent_user }}"
    mode: preserve

# All dryvist skills (docs-pr, github-issues, zammad-incidents, splunk-monitor)
# arrive in one copy from the nix-hermes bundle built above. This deploys
# BEFORE the curriculum and every cron-seeding step, so `cron create --skill
# dryvist/splunk-monitor` (and zammad-incidents delivery references) always
# resolve. splunk-monitor is present even when the monitor fleet is disabled —
# an unreferenced skill on disk is inert.
- name: Deploy the dryvist skills from the nix-hermes bundle
  ansible.builtin.copy:
    src: "{{ hermes_agent_bundle_path }}/skills/dryvist/"
    dest: "{{ hermes_agent_hermes_home }}/skills/dryvist/"
    owner: "{{ hermes_agent_user }}"
    group: "{{ hermes_agent_user }}"
    mode: "0640"
    directory_mode: "0750"

- name: Remove the conflicting legacy Zammad skill copy
  ansible.builtin.file:
    path: "{{ hermes_agent_hermes_home }}/skills/research/dryvist-zammad-incidents"
    state: absent

# The versioned curriculum (H-9): the graded five-job set the job API
# executes, plus the grading sheet, rubric schema and submission runbook.
# curriculum.yml is the canonical manifest — prompts, order, budgets and each
# job's machine-checkable success_checks (contract-asserted in assert.yml).
# Materialized on the guest so the agent can read its own curriculum (the
# `improve` job reviews it) and so a future recurring eval can execute it
# locally; submissions themselves arrive via the inbound job API.
- name: Deploy the versioned curriculum (manifest, jobs, grading, runbook)
  ansible.builtin.copy:
    src: curriculum/
    dest: "{{ hermes_agent_hermes_home }}/curriculum/"
    owner: "{{ hermes_agent_user }}"
    group: "{{ hermes_agent_user }}"
    mode: "0640"
    directory_mode: "0750"

- name: Ensure the catalog-backed curriculum jobs directory exists
  ansible.builtin.file:
    path: "{{ hermes_agent_hermes_home }}/curriculum/jobs"
    state: directory
    owner: "{{ hermes_agent_user }}"
    group: "{{ hermes_agent_user }}"
    mode: "0750"

- name: Deploy curriculum prompt bodies from the immutable catalog
  ansible.builtin.copy:
    content: >-
      {{ lookup('ansible.builtin.file', hermes_agent_prompts_path ~ '/'
         ~ hermes_agent_curriculum_prompt_files[item.id], rstrip=false)
         | regex_replace('(?s)^---\n.*?\n---\n', '') }}
    dest: "{{ hermes_agent_hermes_home }}/curriculum/{{ item.prompt_file }}"
    owner: "{{ hermes_agent_user }}"
    group: "{{ hermes_agent_user }}"
    mode: "0640"
  loop: "{{ hermes_agent_curriculum.jobs }}"
  loop_control:
    label: "{{ item.id }}"

# --- Kanban enqueuer fleet (kanban migration, #83) ---------------------------
# Every recurring workload is a Kanban card dispatched by the gateway's in-process
# board engine (config.yaml kanban: block) — a FRESH worker session per run,
# eliminating the persistent-cron-session failure class (INC-17120). The
# recurrence layer is a thin fleet of `--no-agent --script` crons (no LLM, so
# nothing to poison) that enqueue those cards. All the skills the cards reference
# (dryvist/splunk-monitor, dryvist/github-issues, dryvist/zammad-incidents,
# llm-wiki) are already materialized above, so a card's `--skill` resolves when a
# worker runs it.
- name: Ensure the Hermes scripts directory exists
  ansible.builtin.file:
    path: "{{ hermes_agent_hermes_home }}/scripts"
    state: directory
    owner: "{{ hermes_agent_user }}"
    group: "{{ hermes_agent_user }}"
    mode: "0750"

# Rendered AFTER the prompt set_facts above so lookup('vars', card.prompt_var)
# resolves each card body (catalog + inline prompts alike) at render time.
- name: Deploy the Kanban recurring-task enqueuer script
  ansible.builtin.template:
    src: kanban-enqueue-recurring.sh.j2
    dest: "{{ hermes_agent_hermes_home }}/scripts/{{ hermes_agent_kanban_enqueue_script_name }}"
    owner: "{{ hermes_agent_user }}"
    group: "{{ hermes_agent_user }}"
    mode: "0750"

# State dir for the script-fed digest's delta fingerprint (last-posted state).
- name: Ensure the Hermes state directory exists
  ansible.builtin.file:
    path: "{{ hermes_agent_hermes_home }}/state"
    state: directory
    owner: "{{ hermes_agent_user }}"
    group: "{{ hermes_agent_user }}"
    mode: "0750"

# The script-fed Splunk status digest gathers the numbers itself via the Splunk
# MCP and prints them; the cron below delivers that stdout verbatim to Slack with
# NO LLM in the fact path (structural anti-fabrication fix, Zammad #17143/#17144).
- name: Deploy the script-fed Splunk status-digest script
  ansible.builtin.template:
    src: splunk-digest.py.j2
    dest: "{{ hermes_agent_hermes_home }}/scripts/{{ hermes_agent_splunk_status_digest_script_name }}"
    owner: "{{ hermes_agent_user }}"
    group: "{{ hermes_agent_user }}"
    mode: "0750"

# Zammad stale-ticket auto-close, brought under role management (token from .env,
# no hardcoded secret). Cron is gated off by default (see defaults) — the script
# is deployed regardless so enabling is a one-flag change.
- name: Deploy the Zammad stale-ticket auto-close script
  ansible.builtin.template:
    src: zammad-auto-close.py.j2
    dest: "{{ hermes_agent_hermes_home }}/scripts/{{ hermes_agent_zammad_autoclose_script_name }}"
    owner: "{{ hermes_agent_user }}"
    group: "{{ hermes_agent_user }}"
    mode: "0750"

# Remove the hand-placed orphan scripts under /var/lib/hermes/scripts/ (a dir
# separate from the managed .hermes/scripts/): the old zammad-auto-close.py
# carried a CLEARTEXT Zammad API token (superseded by the managed template above;
# rotate that token), and issue_tracker.py is an unused, unmanaged SQLite tool.
- name: Remove hand-placed orphan scripts (cleartext-token auto-close + unused tracker)
  ansible.builtin.file:
    path: "{{ hermes_agent_home }}/scripts/{{ item }}"
    state: absent
  loop:
    - zammad-auto-close.py
    - issue_tracker.py

# One `<job>-enqueue` script cron per card, same schedule the old agentic cron
# used; each enqueues its workload's current-slot card. Disabled cards create no
# cron (the include is gated on item.enabled).
- name: Reconcile the per-workload Kanban enqueuer crons
  ansible.builtin.include_tasks: reconcile_enqueuer_cron.yml
  loop: "{{ hermes_agent_kanban_cards }}"
  loop_control:
    label: "{{ item.job }}"

# The daily chain-break safety net: one enqueuer cron in `all --backfill` mode.
- name: Reconcile the daily Kanban safety-net enqueuer cron
  ansible.builtin.include_tasks: reconcile_enqueuer_cron.yml
  vars:
    item:
      name: "{{ hermes_agent_kanban_safety_net_cron_name }}"
      schedule: "{{ hermes_agent_kanban_safety_net_schedule }}"
      selector: "all --backfill"
      enabled: "{{ hermes_agent_kanban_safety_net_enabled }}"

# The script-fed Splunk status digest: a --no-agent --script cron whose stdout
# (real numbers the script gathered itself) is delivered verbatim to Slack. No
# LLM in the fact path — nothing to poison. Replaces the LLM digest paths.
- name: Reconcile the script-fed Splunk status-digest cron
  ansible.builtin.include_tasks: reconcile_enqueuer_cron.yml
  vars:
    item:
      name: "{{ hermes_agent_splunk_status_digest_cron_name }}"
      schedule: "{{ hermes_agent_splunk_status_digest_cron_schedule }}"
      script: "{{ hermes_agent_splunk_status_digest_script_name }}"
      deliver: "slack:{{ hermes_agent_splunk_status_digest_channel }}"
      enabled: "{{ hermes_agent_splunk_status_digest_enabled }}"

# Retire the hand-created LLM digest direct cron the script-fed digest replaces:
# pause it (disable-don't-delete) so the two never double-post. `cron list` shows
# only ENABLED jobs, so this is a clean no-op once the job is paused.
- name: List active Hermes crons (to retire the superseded v3 digest)
  ansible.builtin.command: "{{ hermes_agent_bin }} cron list"
  environment:
    HERMES_HOME: "{{ hermes_agent_hermes_home }}"
  become: true
  become_user: "{{ hermes_agent_user }}"
  register: hermes_agent_active_cron_list
  changed_when: false
  when: hermes_agent_splunk_status_digest_enabled | bool

- name: Pause the superseded v3 LLM digest cron (disable-don't-delete)
  ansible.builtin.command: "{{ hermes_agent_bin }} cron pause {{ hermes_agent_superseded_digest_cron_name }}"
  environment:
    HERMES_HOME: "{{ hermes_agent_hermes_home }}"
  become: true
  become_user: "{{ hermes_agent_user }}"
  changed_when: true
  when:
    - hermes_agent_splunk_status_digest_enabled | bool
    - hermes_agent_superseded_digest_cron_name in (hermes_agent_active_cron_list.stdout | default(''))

# Zammad stale-ticket auto-close cron (disabled by default; see defaults). Closures
# deliver to Slack for auditability. Gated on the auto-close flag AND zammad + slack
# credentials being present.
- name: Reconcile the Zammad stale-ticket auto-close cron
  ansible.builtin.include_tasks: reconcile_enqueuer_cron.yml
  vars:
    item:
      name: "{{ hermes_agent_zammad_autoclose_cron_name }}"
      schedule: "{{ hermes_agent_zammad_autoclose_schedule }}"
      script: "{{ hermes_agent_zammad_autoclose_script_name }}"
      deliver: "slack:{{ hermes_agent_slack_hermes_all_channel }}"
      enabled: >-
        {{ hermes_agent_zammad_autoclose_enabled | bool
           and hermes_agent_zammad_url | length > 0
           and hermes_agent_zammad_api_token | length > 0
           and hermes_agent_slack_hermes_all_channel | length > 0 }}

# Restart=always now lives in the unit itself (see the template); remove the
# stale drop-in a prior mechanism left behind (Restart=on-failure, dated Jul 6)
# so it can't override the unit's own policy.
- name: Remove the stale restart-policy drop-in
  ansible.builtin.file:
    path: /etc/systemd/system/hermes-gateway.service.d/99-restart-policy.conf
    state: absent
  notify: Restart hermes-gateway

- name: Deploy the hermes-gateway systemd unit
  ansible.builtin.template:
    src: hermes-gateway.service.j2
    dest: /etc/systemd/system/hermes-gateway.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart hermes-gateway

- name: Deploy the authenticated Hermes Dashboard systemd unit
  ansible.builtin.template:
    src: hermes-dashboard.service.j2
    dest: /etc/systemd/system/hermes-dashboard.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart hermes-dashboard
  when: hermes_agent_dashboard_enabled | bool

- name: Enable and start the Hermes gateway
  ansible.builtin.systemd:
    name: hermes-gateway
    state: started
    enabled: true
    daemon_reload: true

- name: Enable and start the Hermes Dashboard
  ansible.builtin.systemd:
    name: hermes-dashboard
    state: started
    enabled: true
    daemon_reload: true
  when: hermes_agent_dashboard_enabled | bool

# --- Brain-health watchdog ---------------------------------------------------
# A single-deployment brain (ai_default_model) with no fallback + upstream that ALWAYS
# delivers cron failures means a brain outage DMs the operator twice an hour per
# seeded job while nothing pages that the brain is down. This timer probes the
# brain end-to-end and, on a debounced transition, pauses/resumes the seeded
# fleet and alerts once per edge (Slack DM + urgent ntfy). Gated on the Slack
# tokens that seed the spammy fleet in the first place — no fleet, nothing to
# guard. It remains available but disabled while Hermes uses its direct
# one-retry request policy.
- name: Check for the retained Hermes brain-health watchdog timer
  ansible.builtin.stat:
    path: /etc/systemd/system/hermes-brain-watchdog.timer
  register: hermes_agent_brain_watchdog_timer_unit
  when: not (hermes_agent_brain_watchdog_enabled | bool)

- name: Stop and disable the Hermes brain-health watchdog timer
  ansible.builtin.systemd:
    name: hermes-brain-watchdog.timer
    state: stopped
    enabled: false
    daemon_reload: true
  when:
    - not (hermes_agent_brain_watchdog_enabled | bool)
    - hermes_agent_brain_watchdog_timer_unit.stat.exists | default(false)

- name: Deploy the Hermes brain-health watchdog script
  ansible.builtin.template:
    src: hermes-brain-watchdog.sh.j2
    dest: "{{ hermes_agent_brain_watchdog_script_path }}"
    owner: root
    group: root
    mode: "0755"
  notify: Restart hermes-brain-watchdog timer
  when:
    - hermes_agent_brain_watchdog_enabled | bool
    - hermes_agent_slack_bot_token | length > 0
    - hermes_agent_slack_app_token | length > 0

# Who watches the watchdog (stopgap -- see README.md "Watchdog
# self-monitoring"): fired by hermes-brain-watchdog.service's OnFailure= only
# when a probe cycle crashes. Runs as root, independent of the hermes
# user/.env. dest: is a literal, not a role variable, so it never touches
# defaults/main.yml -- keep it in sync with the ExecStart= path in
# templates/hermes-brain-watchdog-alert.service.j2 if either one moves.
- name: Deploy the Hermes brain-health watchdog self-check alert script
  ansible.builtin.template:
    src: hermes-brain-watchdog-alert.sh.j2
    dest: /usr/local/bin/hermes-brain-watchdog-alert.sh
    owner: root
    group: root
    mode: "0755"
  notify: Restart hermes-brain-watchdog timer
  when:
    - hermes_agent_brain_watchdog_enabled | bool
    - hermes_agent_slack_bot_token | length > 0
    - hermes_agent_slack_app_token | length > 0

- name: Deploy the Hermes brain-health watchdog systemd units
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/etc/systemd/system/{{ item }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - hermes-brain-watchdog.service
    - hermes-brain-watchdog.timer
    - hermes-brain-watchdog-alert.service
  notify: Restart hermes-brain-watchdog timer
  when:
    - hermes_agent_brain_watchdog_enabled | bool
    - hermes_agent_slack_bot_token | length > 0
    - hermes_agent_slack_app_token | length > 0

- name: Enable and start the Hermes brain-health watchdog timer
  ansible.builtin.systemd:
    name: hermes-brain-watchdog.timer
    state: started
    enabled: true
    daemon_reload: true
  when:
    - hermes_agent_brain_watchdog_enabled | bool
    - hermes_agent_slack_bot_token | length > 0
    - hermes_agent_slack_app_token | length > 0

# --- Retained optional brain runtime sync ------------------------------------
# Disabled by default while model selection is owned directly by router aliases.
- name: Check for the retained Hermes brain-sync timer
  ansible.builtin.stat:
    path: /etc/systemd/system/hermes-brain-sync.timer
  register: hermes_agent_brain_sync_timer_unit
  when: not (hermes_agent_brain_sync_enabled | bool)

- name: Stop and disable the retained Hermes brain-sync timer
  ansible.builtin.systemd:
    name: hermes-brain-sync.timer
    state: stopped
    enabled: false
    daemon_reload: true
  when:
    - not (hermes_agent_brain_sync_enabled | bool)
    - hermes_agent_brain_sync_timer_unit.stat.exists | default(false)

- name: Ensure the brain-sync state directory exists
  ansible.builtin.file:
    path: "{{ hermes_agent_brain_sync_state_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: hermes_agent_brain_sync_enabled | bool

- name: Seed the brain-sync state file with the converge-time default
  ansible.builtin.copy:
    content: "{{ hermes_agent_model }}\n"
    dest: "{{ hermes_agent_brain_sync_state_file }}"
    owner: root
    group: root
    mode: "0644" # world-readable: the hermes-owned brain-watchdog reads this too
  when: hermes_agent_brain_sync_enabled | bool

- name: Deploy the brain-sync OpenBao credential file (root-only, separate from .env)
  ansible.builtin.template:
    src: hermes-brain-sync.env.j2
    dest: "{{ hermes_agent_brain_sync_env_path }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  when: hermes_agent_brain_sync_enabled | bool

- name: Deploy the Hermes brain-sync script
  ansible.builtin.template:
    src: hermes-brain-sync.sh.j2
    dest: "{{ hermes_agent_brain_sync_script_path }}"
    owner: root
    group: root
    mode: "0755"
  notify: Restart hermes-brain-sync timer
  when: hermes_agent_brain_sync_enabled | bool

- name: Deploy the Hermes brain-sync systemd units
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/etc/systemd/system/{{ item }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - hermes-brain-sync.service
    - hermes-brain-sync.timer
  notify: Restart hermes-brain-sync timer
  when: hermes_agent_brain_sync_enabled | bool

- name: Enable and start the Hermes brain-sync timer
  ansible.builtin.systemd:
    name: hermes-brain-sync.timer
    state: started
    enabled: true
    daemon_reload: true
  when: hermes_agent_brain_sync_enabled | bool

- name: Ship the hermes unit logs to the dedicated hermes Splunk index
  ansible.builtin.include_tasks: syslog_route.yml
  when: hermes_agent_syslog_route_enabled | bool
  tags: hermes_agent_logging

- name: Flush handlers so config/unit changes apply before verification
  ansible.builtin.meta: flush_handlers

# Layer 2 — post-converge verification gate (gateway up + clean journal + a real
# tool-call probe through the router), with a rollback recipe on any failure.
- name: Verify the brain wiring end-to-end after converge
  ansible.builtin.import_tasks: verify.yml
