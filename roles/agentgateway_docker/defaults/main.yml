---
# agentgateway — AI-first data plane (agentgateway.dev, AAIF/Linux Foundation).
# Unifies MCP, LLM, and A2A traffic behind one governed proxy. Deployed as a
# single-container Docker-Compose-in-LXC stack. MCP-first: only MCP/tool
# traffic flows through the gateway; agents keep dialing the LiteLLM router
# directly for inference (LLM routing through the gateway is a later opt-in).
#
# The gateway config is fully regenerated from the template on every converge
# (config as code — no state on the guest worth backing up).

# =============================================================================
# Container image — pinned. Bump via Renovate or manual review.
# cr.agentgateway.dev is the upstream-documented registry (mirrors ghcr.io).
# =============================================================================
agentgateway_docker_image: "cr.agentgateway.dev/agentgateway:v1.3.1"

agentgateway_docker_container_name: agentgateway

# Restart policy for the gateway service.
agentgateway_docker_restart_policy: unless-stopped

# =============================================================================
# Filesystem layout — config only; the gateway itself is stateless.
# =============================================================================
agentgateway_docker_data_dir: /opt/agentgateway

# =============================================================================
# Ports — pulled from the OpenTofu pipeline_constants (DRY: no port literals).
# proxy   = MCP/LLM/A2A traffic port callers dial (Traefik-fronted as
#           https://mcp.<domain>)
# admin   = admin UI / xDS config dump (Traefik-fronted, internal-only)
# metrics = stats server Prometheus /metrics (scraped directly, internal-only)
# =============================================================================
_agentgateway_docker_port_err: >-
  tofu_data.constants.service_ports.agentgateway_* missing —
  regenerate tofu_inventory.json via
  `tofu output -json ansible_inventory`.
agentgateway_docker_proxy_port: >-
  {{ hostvars['localhost']['tofu_data']
     ['constants']['service_ports']['agentgateway_proxy']
     | mandatory(_agentgateway_docker_port_err) }}
agentgateway_docker_admin_port: >-
  {{ hostvars['localhost']['tofu_data']
     ['constants']['service_ports']['agentgateway_admin']
     | mandatory(_agentgateway_docker_port_err) }}
agentgateway_docker_metrics_port: >-
  {{ hostvars['localhost']['tofu_data']
     ['constants']['service_ports']['agentgateway_metrics']
     | mandatory(_agentgateway_docker_port_err) }}

# =============================================================================
# MCP targets — the tool servers the gateway serves on the proxy port. Each
# target gets its own path-scoped route at the capability name (/<name>; a
# legacy /<name>/mcp alias remains until clients migrate, see #22), so every
# runtime (Claude Code, Codex, Hermes, ...) configures one MCP server entry
# per path.
#
# Auth: passthrough, and per-target routes keep it safe — the caller's
# Authorization header only ever reaches the one backend behind its path.
# The Splunk MCP target keeps its own token contract (tokens minted by
# Splunk's GET /services/mcp_token, aud=mcp). A gateway-held backendAuth key
# (from OpenBao) is a planned follow-up so callers need no per-backend
# credential.
#
# tls_insecure skips backend certificate verification — required for the
# Splunk management port's self-signed cert; never set it for public targets.
# =============================================================================
# The Splunk VM's A record lives in the PROXMOX_SUBDOMAIN zone (the DNS zone
# Technitium is authoritative for), not the apex domain — same derivation as
# every other role (cribl_edge, hermes_agent, ...).
agentgateway_docker_splunk_mcp_host: >-
  https://{{ hostvars['localhost']['tofu_data']['splunk_vm']['splunk']['hostname'] }}.{{
  lookup('env', 'PROXMOX_SUBDOMAIN') | mandatory('PROXMOX_SUBDOMAIN required (Doppler)') }}:{{
  hostvars['localhost']['tofu_data']['constants']['service_ports']['splunk_mgmt']
  }}/services/mcp

agentgateway_docker_mcp_targets:
  - name: splunk
    host: "{{ agentgateway_docker_splunk_mcp_host }}"
    tls_insecure: true
  # Context7 (library docs MCP) — proves the outbound-HTTPS federation path.
  # Keyless tier; add a backendAuth key via OpenBao if rate limits bite.
  - name: context7
    host: "https://mcp.context7.com/mcp"
  # Hindsight agent memory — the service's built-in MCP endpoint, dialed via
  # the Traefik load-balanced pool hostname (NOT a single replica) so the
  # gateway inherits the pool's health-based failover across the two
  # stateless replicas. Multi-bank endpoint (/mcp/) so each caller addresses
  # its own bank; keyless inside the default-deny firewall (valid wildcard
  # TLS at the pool, so no tls_insecure).
  - name: hindsight
    host: >-
      https://hindsight.{{ lookup('env', 'PROXMOX_SUBDOMAIN')
      | mandatory('PROXMOX_SUBDOMAIN required (Doppler)') }}/mcp/

# =============================================================================
# Qdrant MCP sidecar — the official mcp-server-qdrant, run as a second compose
# service on this LXC so agents get vector-memory tools (qdrant-store /
# qdrant-find) through the same governed /memory capability route (legacy
# alias /qdrant/mcp until clients migrate). The SIDECAR holds
# the Qdrant API key; callers need no credential (same keyless posture as the
# context7 route). Container-to-container over the compose network — no host
# port, no new tofu constant, no DNS record.
#
# Upstream publishes no container image, so the pinned uv base image runs the
# pinned PyPI release via uvx (Renovate tracks both pins).
#
# Inert-until-creds: an empty API key omits both the sidecar service and its
# gateway route, so the role converges cleanly before the key is seeded.
# =============================================================================
agentgateway_docker_qdrant_mcp_enabled: true
agentgateway_docker_qdrant_mcp_image: "ghcr.io/astral-sh/uv:python3.12-bookworm-slim"
agentgateway_docker_qdrant_mcp_version: "0.8.1"
# Compose-network-internal port only (FastMCP default) — never published on
# the LXC, so it is deliberately NOT a tofu pipeline_constant.
agentgateway_docker_qdrant_mcp_port: 8000
# The MCP server's own working collection (its fastembed vectors are not
# compatible with llamaindex's homelab_docs collection — keep them separate).
agentgateway_docker_qdrant_mcp_collection: agent_memories
# tofu_data.containers.qdrant.ip is ALREADY the resolvable FQDN (same
# precedent as the langgraph A2A target below); port from tofu constants.
agentgateway_docker_qdrant_url: >-
  http://{{ hostvars['localhost']['tofu_data']['containers']['qdrant']['ip'] }}:{{
  hostvars['localhost']['tofu_data']['constants']['vector_db_ports']['qdrant_http']
  | mandatory('tofu_data.constants.vector_db_ports.qdrant_http missing — regenerate tofu_inventory.json') }}
# Bao-first (ai/qdrant → QDRANT_API_KEY, when the site play publishes
# bao_local_llm_secrets to this host), controller-env fallback (Doppler) —
# identical resolution to qdrant_docker itself.
agentgateway_docker_qdrant_api_key: >-
  {{ (bao_local_llm_secrets | default({}))['QDRANT_API_KEY']
     | default(lookup('env', 'QDRANT_API_KEY'), true) }}

# =============================================================================
# Docs-search MCP sidecar — a second mcp-server-qdrant instance, READ-ONLY
# (QDRANT_READ_ONLY=true disables qdrant-store), pointed at llamaindex's
# homelab_docs collection. Works because the indexer writes its dense vectors
# under the fastembed naming convention (fast-nomic-embed-text-v1.5) and both
# sides embed with nomic-embed-text-v1.5 (768 dims). Served at the /docs
# capability route; same inert-until-creds gating as the memory sidecar.
# =============================================================================
agentgateway_docker_docs_mcp_enabled: true
# Compose-network-internal only, like the memory sidecar's port.
agentgateway_docker_docs_mcp_port: 8001
agentgateway_docker_docs_mcp_collection: homelab_docs
agentgateway_docker_docs_mcp_embedding_model: "nomic-ai/nomic-embed-text-v1.5"
agentgateway_docker_docs_mcp_find_description: >-
  Search the homelab documentation (infrastructure, services, runbooks,
  conventions). The 'query' parameter takes a natural-language question;
  returns the most relevant documentation chunks.

# =============================================================================
# A2A targets — native Agent2Agent (JSON-RPC) endpoints the gateway fronts on
# the same proxy port. Each gets a prefix-matched route marked `a2a: {}`, so the
# gateway parses the JSON-RPC and rewrites the agent card's `url` to point back
# at itself. LangGraph is the only A2A-native agent today.
#
# host reaches the LangGraph CONTAINER directly on its API port.
# tofu_data.containers.langgraph.ip is ALREADY the resolvable FQDN — the same
# address Traefik uses as its own langgraph backend — so it hits the container
# directly. Do NOT use langgraph.<sub> (the Traefik ingress alias on :443, a
# needless double-hop). Bare host:port → HTTP, which is what `langgraph dev`
# serves (no TLS), so no backendTLS policy.
# =============================================================================
agentgateway_docker_a2a_targets:
  - name: langgraph
    path_prefix: /a2a/
    host: >-
      {{ hostvars['localhost']['tofu_data']['containers']['langgraph']['ip'] }}:{{
      hostvars['localhost']['tofu_data']['constants']['service_ports']['langgraph_api']
      | mandatory('tofu_data.constants.service_ports.langgraph_api missing — regenerate tofu_inventory.json') }}

# =============================================================================
# Tracing — OTLP/HTTP to the shared Cribl Edge receiver (telemetry always via
# Cribl; Cribl forks to Langfuse + Splunk). Endpoint contract comes from
# group_vars/all.yml. Sampling: keep everything while traffic is low.
# =============================================================================
agentgateway_docker_otlp_endpoint: >-
  {{ ai_orchestration_otel_endpoint
     | mandatory('ai_orchestration_otel_endpoint must be set in group_vars (Cribl Edge OTLP receiver URL)') }}
agentgateway_docker_trace_sampling: "true"
