---
- name: Reset capability validation result for {{ writer_capability_fixture.name }}
  ansible.builtin.set_fact:
    writer_capability_rejected: false

- name: Execute capability validation for {{ writer_capability_fixture.name }}
  block:
    - name: Include the production exact-path capability assertions
      ansible.builtin.include_tasks: >-
        ../../roles/openbao_secrets/tasks/assert_hermes_writer_capabilities.yml
      vars:
        openbao_secrets_hermes_writer_capabilities:
          data:
            data: "{{ writer_capability_fixture.capabilities }}"

  rescue:
    - name: Record rejected capabilities for {{ writer_capability_fixture.name }}
      ansible.builtin.set_fact:
        writer_capability_rejected: true

- name: Assert capability result for {{ writer_capability_fixture.name }}
  ansible.builtin.assert:
    that:
      - writer_capability_rejected | bool == writer_capability_fixture.reject | bool
