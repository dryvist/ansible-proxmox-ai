---
- name: Advance an isolated Hermes bundle for the CAS integration fixture
  hosts: localhost
  gather_facts: false
  become: false
  vars:
    ansible_become: false
    openbao_test_addr: "{{ lookup('env', 'OPENBAO_TEST_ADDR') }}"
    openbao_test_root_token: "{{ lookup('env', 'OPENBAO_TEST_ROOT_TOKEN') }}"
  tasks:
    - name: Advance the bundle while production seeding runs
      ansible.builtin.include_tasks: race_hermes_bundle.yml
