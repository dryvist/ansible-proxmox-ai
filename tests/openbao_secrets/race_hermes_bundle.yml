---
- name: Continuously advance the Hermes bundle version
  community.hashi_vault.vault_kv2_write:
    url: "{{ openbao_test_addr }}"
    auth_method: token
    token: "{{ openbao_test_root_token }}"
    engine_mount_point: secret
    path: ai/hermes
    data:
      HERMES_API_SERVER_KEY: ""
      sibling: "race-{{ item }}"
    validate_certs: false
  loop: "{{ range(0, 20) | list }}"
  no_log: true
