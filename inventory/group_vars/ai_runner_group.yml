---
# ai_runner group vars — bao-first secret resolution for the headless AI job
# runner. Role defaults read env only (backend-agnostic); these override
# bao-first (the `ai-runner` OpenBao domain, see roles/openbao_secrets) with an
# env fallback. Empty values leave the worker idle rather than failing.

# Restart-on-failure handled in the unit itself (Restart=always); no
# systemd_restart_policy phase in this repo's site.yml.

# Vikunja dispatch-queue token (secret/ai/vikunja). Bao-first, env fallback.
ai_runner_vikunja_token: >-
  {{ bao_ai_runner_secrets.VIKUNJA_API_TOKEN
     | default(lookup('env', 'VIKUNJA_API_TOKEN'), true) }}

# Model-provider API keys — third-party static secrets (secret/ai/saas/*).
# Bao-first, env fallback.
ai_runner_anthropic_api_key: >-
  {{ bao_ai_runner_secrets.ANTHROPIC_API_KEY
     | default(lookup('env', 'ANTHROPIC_API_KEY'), true) }}
ai_runner_openai_api_key: >-
  {{ bao_ai_runner_secrets.OPENAI_API_KEY
     | default(lookup('env', 'OPENAI_API_KEY'), true) }}
