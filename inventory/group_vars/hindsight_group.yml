---
# Hindsight agent-memory LXCs (tag `hindsight` → hindsight_group). Two
# stateless API replicas behind the Traefik pool at hindsight.<domain>;
# role config lives in roles/hindsight_docker/defaults — only group-level
# reliability wiring belongs here.

# Restart the Docker engine on failure (systemd restart policy); the
# hindsight container itself carries restart: unless-stopped in compose.
systemd_restart_policy_services:
  - docker
