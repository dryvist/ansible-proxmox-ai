---
# Global variables for all hosts

# System
ansible_become: true
ansible_become_method: sudo

# Shared Cribl Edge OTLP/HTTP receiver — every OTEL-emitting component points
# here, so this is global rather than scoped to ai_orchestration_group.yml
# (roles outside that group, e.g. hermes_agent/open_webui, reference it too).
# Split out so the composed URL stays under the 120-char yaml line limit.
ai_subdomain: "{{ lookup('env', 'PROXMOX_SUBDOMAIN') | mandatory('PROXMOX_SUBDOMAIN required') }}"
ai_otel_http_port: >-
  {{ hostvars['localhost']['tofu_data']['constants']['service_ports']['otel_traces_http'] }}
ai_orchestration_otel_endpoint: "http://cribl-edge.{{ ai_subdomain }}:{{ ai_otel_http_port }}"

# Heavy-tier LLM serving host (the Mac Studio) — single source for its short
# hostname and reserved IP so neither literal is repeated across roles
# (llm_router). The host is a tofu-unifi fixed_ips.json reservation and is NOT
# a PVE guest, so it is absent from the tofu ansible inventory; parameterize
# it from the environment instead (LLM_LARGE_RUNNER_HOST is the FQDN used for
# the llm-large alias — take its short host here). The defaults are the
# current live values, so with the env unset the rendered output is
# byte-identical to before. NOTE: the `llm-large` DNS records themselves are
# owned by ansible-proxmox-apps (technitium_dns group_vars), which keeps its
# own copy of these two values — change both together.
llm_large_serving_host: "{{ (lookup('env', 'LLM_LARGE_RUNNER_HOST') or 'jevans-ms') | split('.') | first }}"
llm_large_serving_ip: >-
  {{ lookup('env', 'LLM_LARGE_RUNNER_IP')
     or ('' if lookup('env', 'LLM_LARGE_RUNNER_HOST') else '10.0.50.10') }}

# SINGLE SOURCE OF TRUTH for the fabric's default chat/agent model. Both the
# Hermes Agent brain (hermes_agent_model) and Open WebUI's default chat model
# (open_webui_default_model) resolve to this, so the human chat UI and the
# autonomous agent always run the same default by construction. The value is
# the REAL model id served via https://llm.<subdomain>/v1 — the router serves
# no aliases (design rule 2026-07-17).
#
# 2026-07-18: tofu/Ansible no longer OWN the active brain — this is now
# bao-first (secret/ai/public/brain, field active_model, the ai-public
# OpenBao domain — see roles/openbao_secrets), with the literal below as the
# fallback ONLY. Re-pointing the fabric brain day-to-day is an OpenBao write,
# not a converge: `bao kv patch secret/ai/public/brain active_model=<id>`,
# picked up by the hermes_agent/open_webui brain-sync systemd timers on their
# next poll (minutes, no rebuild) — see those roles' *_brain_sync_* vars and
# READMEs. This var (and the literal fallback) still matter for THREE cases
# a runtime poll can't cover: (1) the value config.yaml/DEFAULT_MODELS is
# rendered with at converge/first boot, before any poll has run; (2) what a
# brain-sync timer falls back to if OpenBao or the router is unreachable;
# (3) the value llm_router/tasks/assert.yml checks at converge time (that
# check is necessarily a point-in-time proof against WHATEVER this resolves
# to at converge — it cannot see a later OpenBao-only change, which is why
# brain-sync re-validates live against the router's own /v1/model/info
# before ever switching — see roles/hermes_agent's brain-sync script).
#
# 2026-07-18: the deepseek-v4-flash STOPGAP (cloud egress while local serving
# flapped) is superseded — the flap's root causes are fixed and verified
# (llm-gate secret-zero env-file, nix-darwin#1742; macOS Local Network
# privacy platform-curl, #1743), and the resident 80B Instruct brain is the
# 2026-07-17 agentic-bench winner (nix-ai#1272). Local >=75B mandate stands.
ai_default_model: >-
  {{ bao_ai_public_secrets.active_model
     | default('mlx-community/Qwen3-Next-80B-A3B-Instruct-4bit', true) }}

# Hermes Agent's OWN brain, DECOUPLED from ai_default_model (user decision
# 2026-07-19) so the agent brain and the ai-default fabric brain can diverge.
# hermes_agent_model resolves to THIS, not ai_default_model. Runtime re-point
# is the hermes_agent brain-sync timer polling its OWN OpenBao key
# secret/ai/public/hermes-brain (see roles/openbao_secrets ai-public paths and
# the hermes_agent brain-sync vars); this literal is the CONVERGE/first-boot
# value and the fallback when OpenBao or the router is unreachable = the
# OptiQ-35B agentic-bench winner (rank-1 tool-caller; the only proven brain
# that fits resident beside the ~49 GB cluster shard, so it survives cluster
# windows).
#
# HARD CONSTRAINTS travel WITH this alias (same policy inherited from the
# router): (1) >=64K served context — Hermes' compression floor. OptiQ serves
# 65,536 only when configured for it (as a llama-swap SWAP-class model it drops
# to ~32K and DISQUALIFIES). NOTE (lifecycle-e2e): a llama-swap class flip to
# "resident" does NOT survive a cluster window — cluster-join boots out the
# WHOLE llama-swap server. The cluster-window-safe form is a STANDALONE
# dedicated-port OptiQ vllm-mlx agent OUTSIDE llama-swap (its own port, like the
# cluster :11440 pattern), configured for 65,536 and excluded from the reap. So
# this value is safe only once that standalone OptiQ agent exists (nix side) —
# see the PR gate. (2) No cross-tier fallback (llm_router router_settings) — a
# smaller-context fallback poisons the compression path.
hermes_brain_model: mlx-community/Qwen3.6-35B-A3B-OptiQ-4bit

# Escalation rubric v1 — WHICH tier a task deserves, encoded as data (from the
# 2026-07-12 document benchmark: two planted traps, three model classes).
# Consumers: each tier names the REAL router model id it escalates to (no
# aliases), and the curriculum loop re-fits decision_rule from graded
# 30B-vs-deep run deltas —
# the feature definitions (F1-F8) live with the curriculum
# (roles/hermes_agent/files/curriculum/escalation-rubric-schema.md). This
# block is the single source the fitted values update; nothing here changes
# routing until a consumer reads it.
ai_escalation_rubric:
  version: 1
  fitted: false # decision_rule holds PRIORS until curriculum grade deltas land
  tiers:
    # Default for everything, including "is this claim true" verification —
    # benchmark: caught the arithmetic trap with correct math in 50 s wall.
    # Known ceiling: shallow on second-order effects (flagged the hidden
    # constraint as a bullet, never did the math).
    - id: broad
      router_model: "{{ ai_default_model }}"
      status: active
    # "What else breaks / find what the author missed" second-order analysis —
    # benchmark: caught BOTH traps and dissected the source's own
    # contradiction, a class deeper than broad. Constraints are hard: only
    # worth invoking while the backend is RESIDENT (a cold escalation pays a
    # multi-minute swap load and can wedge the serving proxy), and with a
    # generous output-token budget (thinking output truncates at small caps).
    - id: deep-analysis
      router_model: mlx-community/Qwen3-Next-80B-A3B-Thinking-4bit
      status: active
      constraint: resident-only
    # The cluster-served deep tier: queued deep packets during a cluster
    # window; the latency veto below already excluded anything that cannot
    # wait, so an unavailable window DEFERS a deep task, never silently
    # downgrades it.
    - id: cluster-deep
      router_model: null # registered only when a window is up (gated build-out)
      status: blocked-upstream
      blocked_by:
        - mlx-lm pipeline-generate bug (upstream fix drafted)
        - serving-host wired-memory headroom mitigation required
  decision_rule:
    # Prospective F1-F7 difficulty scores (0-3 each) are weighted below; F8
    # latency_tolerance is the routing veto after the weighted score. Reasoning
    # depth + cross-source synthesis are weighted highest (hypothesis: where a
    # bigger brain most outperforms; long tool chains are executor-bound, not
    # brain-bound).
    weights:
      reasoning_depth: 2.0
      cross_source_synthesis: 1.5
      context_breadth: 1.0
      ambiguity: 1.0
      tool_chain_length: 0.5
      error_recovery_demand: 0.5
      output_structure_complexity: 0.5
    deep_threshold: 12 # score >= 12 -> deep
    broad_threshold: 6 # score <= 6 -> broad; between -> either (by availability)
    latency_veto:
      latency_tolerance: 0
      target_tier: broad

# AI serving timeout chain (client-is-decider). Each OUTER layer must OUTLIVE the
# inner one, so no intermediate guard kills a still-healthy generation and the
# CLIENT alone decides when to give up:
#   nix-darwin vllm-mlx server guard 3600s (external to this repo, not assertable)
#     > llm_router per-attempt timeout  (ai_router_request_timeout_seconds)
#       > Hermes client stream read     (ai_stream_read_timeout_seconds)
# The two in-repo layers are named ONCE here (not as bare literals in each role)
# so the ordering invariant is a single source of truth AND the hermes_agent
# Layer-1 assert can verify `read < router` across two roles that never share a
# play — see roles/hermes_agent/tasks/assert.yml. Consumers:
# hermes_agent_stream_read_timeout and llm_router_request_timeout_seconds resolve
# to these, so the rendered configs stay byte-identical to the prior literals.
ai_stream_read_timeout_seconds: 1800
ai_router_request_timeout_seconds: 2400

# Resource-domain secrets fetched from OpenBao by the openbao_secrets pre-play.
# Defaults to an empty dict so every consumer's
# `bao_local_llm_secrets.X | default(lookup('env','X'), true)` resolves even
# when the fetch is skipped (BAO_ADDR unset, or the domain's role_id/secret_id
# envs unset) or the host is outside the openbao_secrets play. The pre-play
# overrides this per host when active. bao_ai_public_secrets is the same
# shape for the `ai-public` domain (see ai_default_model above): empty here
# resolves to the ai_default_model literal fallback until that domain's
# AppRole exists and secret/ai/public/brain is seeded.
bao_local_llm_secrets: {}
bao_ai_public_secrets: {}
