---
# Restart-on-failure for the Hermes gateway daemon, applied DRY by the shared
# systemd_restart_policy role (site.yml Phase 9) rather than hardcoded in the unit.
systemd_restart_policy_services:
  - hermes-gateway

# GitHub App creds for the autonomous docs-contributor. Bao-first (local-llm
# domain, secret/ai/hermes), env fallback — empty until the App is provisioned.
hermes_agent_github_app_id: >-
  {{ bao_local_llm_secrets.HERMES_GITHUB_APP_ID
     | default(lookup('env', 'HERMES_GITHUB_APP_ID'), true) }}
hermes_agent_github_app_installation_id: >-
  {{ bao_local_llm_secrets.HERMES_GITHUB_APP_INSTALLATION_ID
     | default(lookup('env', 'HERMES_GITHUB_APP_INSTALLATION_ID'), true) }}
hermes_agent_github_app_private_key: >-
  {{ bao_local_llm_secrets.HERMES_GITHUB_APP_PRIVATE_KEY
     | default(lookup('env', 'HERMES_GITHUB_APP_PRIVATE_KEY'), true) }}

# Shared Splunk MCP client token (read/search access). Bao-first (local-llm
# domain, secret/ai/mcp/splunk), env fallback — empty until the creds are
# seeded. The URL is the shared agentgateway /splunk route (non-secret, built
# from PROXMOX_SUBDOMAIN in the role defaults), same posture as context7/qdrant,
# so only the token is sourced here.
hermes_agent_splunk_mcp_token: >-
  {{ bao_local_llm_secrets.SPLUNK_MCP_TOKEN
     | default(lookup('env', 'SPLUNK_MCP_TOKEN'), true) }}

# Context7 MCP key (current library docs on demand). Bao-first, env fallback.
hermes_agent_context7_api_key: >-
  {{ bao_local_llm_secrets.CONTEXT7_API_KEY
     | default(lookup('env', 'CONTEXT7_API_KEY'), true) }}

# Inbound webhook receiver global HMAC secret. Bao-first (local-llm domain,
# secret/ai/hermes, generated-if-absent at the least-shared tier — hermes is its
# only consumer), env fallback. Global fallback for every route that doesn't set
# its own secret; empty disables the webhook platform (see defaults).
hermes_agent_webhook_secret: >-
  {{ bao_local_llm_secrets.WEBHOOK_SECRET
     | default(lookup('env', 'WEBHOOK_SECRET'), true) }}

# Inbound job-submission API bearer key. Bao-first (local-llm domain,
# secret/ai/hermes), env fallback. Unlike the webhook secret, this key has
# external consumers by design (any sanctioned submitter dials
# https://hermes-api.<sub> with it), so it lives in the shared engine — seeded
# programmatically, never hand-typed. Empty disables the platform (see defaults).
hermes_agent_api_server_key: >-
  {{ bao_local_llm_secrets.HERMES_API_SERVER_KEY
     | default(lookup('env', 'HERMES_API_SERVER_KEY'), true) }}

# Zammad ITSM client (dryvist/zammad-incidents skill). The canonical API pair is
# published at secret/ai/mcp/zammad; legacy environment names remain only as a
# local fallback. Empty disables the integration until Zammad is deployed.
hermes_agent_zammad_url: >-
  {{ bao_local_llm_secrets.ZAMMAD_MCP_URL
     | default(lookup('env', 'ZAMMAD_URL'), true) }}
hermes_agent_zammad_api_token: >-
  {{ bao_local_llm_secrets.ZAMMAD_MCP_TOKEN
     | default(lookup('env', 'ZAMMAD_API_TOKEN'), true) }}

# GitHub issues + org projects PAT (read/write Issues in all repos, read/write
# Projects v2 in the dryvist org). Bao-first (local-llm domain, secret/ai/hermes),
# env fallback — empty until the token is present. See the dryvist/github-issues
# skill for usage.
hermes_agent_github_issues_pat: >-
  {{ bao_local_llm_secrets.GH_PAT_WRITE_PROJECT_ISSUES
     | default(lookup('env', 'GH_PAT_WRITE_PROJECT_ISSUES'), true) }}

# Read-only GitHub security-alert token for the bot-PR triage job (reads
# code-scanning + Dependabot alerts + PR files across all repos). Separate from
# the issues PAT (which supplies the label write). Bao-first (local-llm domain,
# secret/ai/hermes), env fallback — empty until seeded.
hermes_agent_github_alerts_token: >-
  {{ bao_local_llm_secrets.GH_TOKEN_SECURITY_ALERTS_READ
     | default(lookup('env', 'GH_TOKEN_SECURITY_ALERTS_READ'), true) }}

# Codex CLI auth (ChatGPT-OAuth ~/.codex/auth.json) for the isolated
# codex-runner user. Bao-first (local-llm domain, secret/ai/hermes), env
# fallback — empty until an operator seeds it. Create-only on the guest: this
# is only a bootstrap snapshot, and Codex's guest-side refresh takes over after
# first login (see roles/codex_runner/README.md).
codex_runner_auth_json: >-
  {{ bao_local_llm_secrets.CODEX_AUTH_JSON
     | default(lookup('env', 'CODEX_AUTH_JSON'), true) }}
